<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Code de la route Israël — en français</title>
<meta name="description" content="Réviser la théorie du code de la route israélien en français : panneaux, règles, quiz et examens blancs.">
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1c2530; --muted:#5c6b7a;
  --accent:#1467b3; --accent-soft:#e3eefb; --red:#c8102e; --red-soft:#fdeaea;
  --green:#1d8a4e; --green-soft:#e4f5eb; --amber:#b97a00; --amber-soft:#fdf3dd;
  --line:#dde4ec; --shadow:0 1px 3px rgba(20,35,60,.08),0 4px 14px rgba(20,35,60,.06);
  --radius:14px; --nav-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.55;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
header.app{
  position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 16px;
}
header.app h1{font-size:17px;font-weight:700;letter-spacing:-.01em}
header.app h1 .flag{margin-right:6px}
#countdown{font-size:13px;font-weight:600;background:var(--accent-soft);color:var(--accent);
  padding:5px 10px;border-radius:99px;white-space:nowrap}
#countdown.urgent{background:var(--red-soft);color:var(--red)}
main{max-width:760px;margin:0 auto;padding:16px}
section.view{display:none}
section.view.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card h2{font-size:18px;margin-bottom:8px;letter-spacing:-.01em}
.card h3{font-size:15px;margin:14px 0 6px}
.card p{font-size:14.5px;color:var(--ink)}
.muted{color:var(--muted);font-size:13.5px}
.pill{display:inline-block;font-size:12px;font-weight:600;padding:3px 9px;border-radius:99px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:15px;font-weight:600;border:none;border-radius:12px;cursor:pointer;
  padding:12px 18px;background:var(--accent);color:#fff;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.98)}
.btn.secondary{background:var(--accent-soft);color:var(--accent)}
.btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn.green{background:var(--green)} .btn.red{background:var(--red)}
.btn.block{width:100%;margin-top:10px}
.btn:disabled{opacity:.45;cursor:default}

nav.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:30;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--card);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr)}
nav.tabbar button{
  border:none;background:none;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:11px;font-weight:600;color:var(--muted);-webkit-tap-highlight-color:transparent}
nav.tabbar button .ico{font-size:21px;line-height:1}
nav.tabbar button.active{color:var(--accent)}

.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{font-size:13px;font-weight:600;padding:7px 13px;border-radius:99px;cursor:pointer;
  background:var(--card);border:1px solid var(--line);color:var(--muted);-webkit-tap-highlight-color:transparent}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

.sign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.sign-cell{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 6px 8px;text-align:center;cursor:pointer;box-shadow:var(--shadow);
  -webkit-tap-highlight-color:transparent}
.sign-cell:active{transform:scale(.97)}
.sign-cell svg{width:64px;height:64px;display:block;margin:0 auto 6px}
.sign-cell .nm{font-size:11px;font-weight:600;color:var(--ink);line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sign-cell .known{position:relative}
.sign-cell.mastered{border-color:var(--green)}

.sheet-backdrop{position:fixed;inset:0;background:rgba(15,25,40,.45);z-index:40;
  display:none;align-items:flex-end;justify-content:center}
.sheet-backdrop.open{display:flex}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:760px;
  max-height:82vh;overflow-y:auto;padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  animation:slideup .22s ease}
@keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheet .sign-big{display:flex;justify-content:center;margin-bottom:14px}
.sheet .sign-big svg{width:150px;height:150px}
.sheet h2{font-size:19px;text-align:center;margin-bottom:4px}
.sheet .num{text-align:center;margin-bottom:12px}
.sheet .close{margin-top:16px}
.tipbox{background:var(--amber-soft);border-radius:10px;padding:10px 12px;font-size:14px;margin-top:10px}
.tipbox b{color:var(--amber)}

.flash-stage{min-height:330px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:20px}
.flash-stage svg{width:170px;height:170px}
.flash-answer{margin-top:14px}
.flash-answer h3{font-size:18px;margin-bottom:4px}
.flash-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.progressbar{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:8px 0 4px}
.progressbar>i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .3s}

.qopt{display:block;width:100%;text-align:left;font-family:inherit;font-size:14.5px;
  background:var(--card);border:1.5px solid var(--line);border-radius:12px;
  padding:12px 14px;margin-bottom:9px;cursor:pointer;color:var(--ink);-webkit-tap-highlight-color:transparent}
.qopt:active{border-color:var(--accent)}
.qopt.correct{border-color:var(--green);background:var(--green-soft)}
.qopt.wrong{border-color:var(--red);background:var(--red-soft)}
.qopt.reveal{border-color:var(--green)}
.qopt:disabled{cursor:default;opacity:1}
.qopt .optsign svg{width:84px;height:84px;display:block;margin:2px auto}
.q-sign{display:flex;justify-content:center;margin:10px 0 14px}
.q-sign svg{width:140px;height:140px}
.explain{border-radius:10px;padding:11px 13px;font-size:14px;margin-top:6px}
.explain.good{background:var(--green-soft)} .explain.bad{background:var(--red-soft)}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
  font-size:13.5px;font-weight:600;color:var(--muted)}
.score-big{font-size:44px;font-weight:800;text-align:center;letter-spacing:-.02em}
.verdict{text-align:center;font-size:17px;font-weight:700;margin:4px 0 14px}
.verdict.pass{color:var(--green)} .verdict.fail{color:var(--red)}
.review-item{border-top:1px solid var(--line);padding:12px 0}
.review-item .rq{font-weight:600;font-size:14px;margin-bottom:4px}
.review-item svg{width:64px;height:64px}

.lesson{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);
  margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.lesson>button.lhead{width:100%;display:flex;align-items:center;gap:12px;border:none;
  background:none;font-family:inherit;text-align:left;padding:15px 16px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.lesson .lhead .lico{font-size:22px}
.lesson .lhead .lt{flex:1}
.lesson .lhead .lt b{font-size:15.5px;display:block}
.lesson .lhead .lt span{font-size:12.5px;color:var(--muted)}
.lesson .lhead .arr{color:var(--muted);transition:transform .2s}
.lesson.open .lhead .arr{transform:rotate(90deg)}
.lesson .lbody{display:none;padding:2px 16px 16px;font-size:14.5px}
.lesson.open .lbody{display:block}
.lesson .lbody h4{font-size:14px;margin:14px 0 5px;color:var(--accent)}
.lesson .lbody ul{padding-left:20px;margin:6px 0}
.lesson .lbody li{margin-bottom:5px}
.lesson .lbody table{width:100%;border-collapse:collapse;font-size:13.5px;margin:8px 0}
.lesson .lbody th,.lesson .lbody td{border:1px solid var(--line);padding:7px 9px;text-align:left}
.lesson .lbody th{background:var(--accent-soft);color:var(--accent)}
.keyfact{background:var(--accent-soft);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:14px}
.warnfact{background:var(--red-soft);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:14px}
.curb{display:inline-block;width:44px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.2);
  vertical-align:middle;margin-right:8px}
.inline-sign{display:inline-block;vertical-align:middle;margin:0 4px}
.inline-sign svg{width:34px;height:34px;display:block}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px;text-align:center;box-shadow:var(--shadow)}
.stat b{font-size:22px;display:block}
.stat span{font-size:12px;color:var(--muted)}
.plan-day{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line)}
.plan-day:first-of-type{border-top:none}
.plan-day input[type=checkbox]{width:20px;height:20px;margin-top:2px;accent-color:var(--green)}
.plan-day label{font-size:14px;flex:1}
.plan-day label b{display:block;font-size:13px;color:var(--accent)}
.plan-day.done label{opacity:.55;text-decoration:line-through}

.home-hero{background:linear-gradient(135deg,#1467b3,#0d4f8f);color:#fff;border:none}
.home-hero h2{color:#fff}
.home-hero p{color:#dcebfa;font-size:14px}
.home-hero .btn{background:#fff;color:var(--accent);margin-top:12px}

@media(min-width:640px){
  .sign-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .sheet-backdrop{align-items:center}
  .sheet{border-radius:20px;max-width:520px}
}
</style>
</head>
<body>

<header class="app">
  <h1><span class="flag">🇮🇱</span>Code de la route</h1>
  <div id="countdown"></div>
</header>

<main>
  <section class="view" id="view-accueil"></section>
  <section class="view" id="view-lecons">
    <div class="card" style="margin-bottom:14px">
      <h2>📚 La théorie, thème par thème</h2>
      <p class="muted">Lis chaque leçon, puis vérifie avec les quiz. Les chiffres à connaître par cœur sont surlignés en bleu.</p>
    </div>
    <div id="lessons-list"></div>
  </section>
  <section class="view" id="view-panneaux">
    <div class="card" style="margin-bottom:14px">
      <h2>🚸 Les panneaux israéliens</h2>
      <p class="muted">Touche un panneau pour voir sa signification et l'astuce d'examen.</p>
    </div>
    <div class="chips" id="sign-chips"></div>
    <div class="sign-grid" id="sign-grid"></div>
  </section>
  <section class="view" id="view-cartes"></section>
  <section class="view" id="view-quiz"></section>
</main>

<div class="sheet-backdrop" id="sheet-backdrop">
  <div class="sheet" id="sheet"></div>
</div>

<nav class="tabbar">
  <button data-view="accueil" class="active"><span class="ico">🏠</span>Accueil</button>
  <button data-view="lecons"><span class="ico">📚</span>Leçons</button>
  <button data-view="panneaux"><span class="ico">⚠️</span>Panneaux</button>
  <button data-view="cartes"><span class="ico">🃏</span>Cartes</button>
  <button data-view="quiz"><span class="ico">✅</span>Quiz</button>
</nav>

<script>
'use strict';

/* ================= DONNÉES : PANNEAUX (rempli après vérification) ================= */
const SIGNS = [{"id":"chaussee-deformee","cat":"danger","num":"101","name":"Chaussée déformée","short":"Route en mauvais état","sens":"Route cahoteuse ou dégradée devant toi : réduis la vitesse. Deux bosses = route abîmée naturellement.","tip":"Ne pas confondre avec le 144 (dos d'âne construit) : 101 = DEUX bosses (route dégradée), 144 = UNE bosse (ralentisseur volontaire).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M28 91 L37 91 Q45 77 53 91 L60 91 L67 91 Q75 77 83 91 L92 91 L92 96 L28 96 Z\" fill=\"#14181d\"/></svg>"},{"id":"virage-droite","cat":"danger","num":"102","name":"Virage serré à droite","short":"Virage serré à droite","sens":"Virage serré vers la droite devant toi : ralentis avant le virage, pas dedans.","tip":"La flèche israélienne se termine en « queue d'aronde » (fourche) — c'est la signature graphique de toute la série des virages (102-106).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M52 94 L52 74 Q52 60 66 60 L70 60\" stroke=\"#14181d\" stroke-width=\"9\" fill=\"none\"/><path d=\"M68 50 L86 60 L68 70 Z\" fill=\"#14181d\"/><path d=\"M46 98 L58 98 L52 87 Z\" fill=\"#ffffff\"/></svg>"},{"id":"virage-gauche","cat":"danger","num":"103","name":"Virage serré à gauche","short":"Virage serré à gauche","sens":"Virage serré vers la gauche devant toi : ralentis avant d'y entrer.","tip":"102 = droite, 103 = gauche. Regarde bien la direction de la pointe de la flèche.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M68 94 L68 74 Q68 60 54 60 L50 60\" stroke=\"#14181d\" stroke-width=\"9\" fill=\"none\"/><path d=\"M52 50 L34 60 L52 70 Z\" fill=\"#14181d\"/><path d=\"M62 98 L74 98 L68 87 Z\" fill=\"#ffffff\"/></svg>"},{"id":"virages","cat":"danger","num":"106","name":"Route sinueuse","short":"Succession de virages","sens":"Succession de virages devant toi : adapte ta vitesse sur toute la section.","tip":"104/105 = exactement DEUX virages (le premier coude de la flèche donne le sens du premier virage — piège classique). 106 = plus de deux.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M66 46 Q50 52 52 64 Q54 74 64 78 Q72 82 70 94\" stroke=\"#14181d\" stroke-width=\"8.5\" fill=\"none\"/><path d=\"M58 38 L78 42 L64 56 Z\" fill=\"#14181d\"/><path d=\"M64 98 L76 98 L70 87 Z\" fill=\"#ffffff\"/></svg>"},{"id":"retrecissement","cat":"danger","num":"109","name":"Chaussée rétrécie","short":"La chaussée se rétrécit","sens":"La chaussée devient plus étroite (des deux côtés). Les variantes 110/111 signalent un rétrécissement par la droite ou par la gauche.","tip":"Ce panneau seul ne donne AUCUNE priorité : dans un passage étroit, la priorité est réglée par les panneaux 307/308.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M47 94 Q47 74 53 64 L53 50\" stroke=\"#14181d\" stroke-width=\"7\" fill=\"none\"/><path d=\"M73 94 Q73 74 67 64 L67 50\" stroke=\"#14181d\" stroke-width=\"7\" fill=\"none\"/></svg>"},{"id":"dos-dane","cat":"danger","num":"144","name":"Ralentisseur (dos d'âne)","short":"Ralentisseur construit","sens":"Bandes surélevées construites sur la chaussée : ralentis fortement.","tip":"UNE bosse = ralentisseur construit (144) ; DEUX bosses = chaussée déformée (101).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M32 91 L47 91 Q60 71 73 91 L88 91 L88 97 L32 97 Z\" fill=\"#14181d\"/></svg>"},{"id":"glissante","cat":"danger","num":"141","name":"Chaussée glissante","short":"Risque de dérapage","sens":"Risque de dérapage (pluie, huile, gravillons) : ralentis et évite les mouvements brusques du volant et des freins.","tip":"L'examen israélien adore l'associer aux « premières pluies » (גשם ראשון) : après des mois secs, la route devient très glissante dès les premières gouttes.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g transform=\"translate(60 54) rotate(-14)\"><path d=\"M-17 10 L-17 -2 Q-17 -8 -12 -9 L-9 -15 Q-7 -19 -2 -19 L8 -19 Q12 -19 14 -15 L16 -9 Q20 -8 20 -2 L20 10 Q20 13 16 13 L-13 13 Q-17 13 -17 10 Z\" fill=\"#14181d\"/><rect x=\"-14\" y=\"13\" width=\"8\" height=\"6\" fill=\"#14181d\"/><rect x=\"7\" y=\"13\" width=\"8\" height=\"6\" fill=\"#14181d\"/></g><path d=\"M38 94 Q46 88 42 82 Q38 76 46 71\" stroke=\"#14181d\" stroke-width=\"4.5\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M62 96 Q70 90 66 84 Q62 78 70 73\" stroke=\"#14181d\" stroke-width=\"4.5\" fill=\"none\" stroke-linecap=\"round\"/></svg>"},{"id":"pietons-avert","cat":"danger","num":"135","name":"Passage piétons à proximité","short":"Passage piétons plus loin","sens":"Un passage pour piétons se trouve plus loin : ralentis et prépare-toi à t'arrêter.","tip":"Piège majeur : 135 (triangle, AVANT le passage, avertit) ≠ 306 (carré bleu, AU passage même, oblige à céder aux piétons engagés).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g transform=\"translate(60 70) scale(1.1)\" stroke=\"#14181d\" stroke-width=\"5.5\" stroke-linecap=\"round\" fill=\"none\"><circle cx=\"1\" cy=\"-24\" r=\"6.5\" fill=\"#14181d\" stroke=\"none\"/><path d=\"M0 -16 L-1 4\"/><path d=\"M-1 -13 L-11 -2\"/><path d=\"M-1 -13 L9 -6\"/><path d=\"M-1 4 L-10 20\"/><path d=\"M-1 4 L8 19\"/></g><rect x=\"36\" y=\"90\" width=\"10\" height=\"5\" fill=\"#14181d\"/><rect x=\"54\" y=\"90\" width=\"10\" height=\"5\" fill=\"#14181d\"/><rect x=\"72\" y=\"90\" width=\"10\" height=\"5\" fill=\"#14181d\"/></svg>"},{"id":"ecole","cat":"danger","num":"136","name":"Piétons à proximité (école)","short":"Piétons / abords d'école","sens":"Des piétons peuvent se trouver sur ou près de la chaussée : abords d'écoles, de jardins publics, de zones résidentielles.","tip":"Israël n'a PAS de panneau « enfants » séparé : c'est ce pictogramme adulte + enfant (136) qui est posé près des écoles.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g stroke=\"#14181d\" stroke-width=\"5.5\" stroke-linecap=\"round\" fill=\"none\"><circle cx=\"50\" cy=\"46\" r=\"6.5\" fill=\"#14181d\" stroke=\"none\"/><path d=\"M50 53 L50 74\"/><path d=\"M50 58 L40 68\"/><path d=\"M50 58 L62 66\"/><path d=\"M50 74 L42 92\"/><path d=\"M50 74 L57 92\"/><circle cx=\"72\" cy=\"62\" r=\"5\" fill=\"#14181d\" stroke=\"none\"/><path d=\"M72 67 L72 80\" stroke-width=\"4.5\"/><path d=\"M72 70 L64 66\" stroke-width=\"4.5\"/><path d=\"M72 80 L67 92\" stroke-width=\"4.5\"/><path d=\"M72 80 L78 92\" stroke-width=\"4.5\"/></g></svg>"},{"id":"cyclistes","cat":"danger","num":"137","name":"Cyclistes","short":"Circulation de cyclistes","sens":"Circulation de cyclistes à proximité ou traversée de piste cyclable.","tip":"En Israël, « אופניים » inclut légalement les vélos électriques ET les trottinettes électriques — question moderne de la banque officielle.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g transform=\"translate(60 76) scale(0.95)\" stroke=\"#14181d\" stroke-width=\"4.5\" fill=\"none\" stroke-linecap=\"round\"><circle cx=\"-17\" cy=\"10\" r=\"12\"/><circle cx=\"17\" cy=\"10\" r=\"12\"/><path d=\"M-17 10 L-8 -8 L8 -8 L17 10 M-8 -8 L2 10 L-17 10\"/><path d=\"M8 -8 L5 -14 M0 -14 L10 -14\"/><path d=\"M-8 -8 L-11 -14 M-15 -14 L-7 -14\"/></g></svg>"},{"id":"feux","cat":"danger","num":"122","name":"Feux de circulation","short":"Feu tricolore plus loin","sens":"Feu tricolore devant toi, à un endroit où il peut surprendre (sortie de virage, feu récent).","tip":"Seul panneau d'avertissement israélien dont le pictogramme est en COULEUR (rouge-jaune-vert), pas en noir.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><rect x=\"47\" y=\"42\" width=\"26\" height=\"52\" rx=\"5\" fill=\"#14181d\"/><circle cx=\"60\" cy=\"53\" r=\"6\" fill=\"#e03131\"/><circle cx=\"60\" cy=\"68\" r=\"6\" fill=\"#f5c500\"/><circle cx=\"60\" cy=\"83\" r=\"6\" fill=\"#22a95c\"/></svg>"},{"id":"giratoire-avert","cat":"danger","num":"121","name":"Rond-point à l'approche","short":"Rond-point plus loin","sens":"Un rond-point se trouve au prochain carrefour : ralentis à l'approche.","tip":"Piège n°1 : 121 (triangle) AVERTIT à distance ; 303 (rond bleu) est planté AU giratoire et OBLIGE à céder à ceux qui y circulent.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g transform=\"translate(0 8) scale(0.78) translate(17 12)\"><g transform=\"rotate(0 60 62)\"><path d=\"M60 34 A26 26 0 0 1 84.5 51\" stroke=\"#14181d\" stroke-width=\"8\" fill=\"none\"/><path d=\"M88 40 L88 60 L72 49 Z\" fill=\"#14181d\"/></g><g transform=\"rotate(120 60 62)\"><path d=\"M60 34 A26 26 0 0 1 84.5 51\" stroke=\"#14181d\" stroke-width=\"8\" fill=\"none\"/><path d=\"M88 40 L88 60 L72 49 Z\" fill=\"#14181d\"/></g><g transform=\"rotate(240 60 62)\"><path d=\"M60 34 A26 26 0 0 1 84.5 51\" stroke=\"#14181d\" stroke-width=\"8\" fill=\"none\"/><path d=\"M88 40 L88 60 L72 49 Z\" fill=\"#14181d\"/></g></g></svg>"},{"id":"double-sens","cat":"danger","num":"145","name":"Circulation à double sens","short":"Route à double sens","sens":"La route devient bidirectionnelle (souvent après un sens unique ou des chaussées séparées) : serre à droite.","tip":"Réflexe attendu au QCM : serrer à droite et ne pas dépasser sans visibilité — du trafic arrive désormais en face.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g transform=\"translate(50 72) rotate(0) scale(0.92)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#14181d\"/></g><g transform=\"translate(70 72) rotate(180) scale(0.92)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#14181d\"/></g></svg>"},{"id":"descente","cat":"danger","num":"140","name":"Descente dangereuse","short":"Descente raide","sens":"Descente raide devant toi : rétrograde AVANT la descente et utilise le frein moteur.","tip":"Spécificité israélienne : pas de pourcentage affiché. Réponse attendue : passer une vitesse inférieure avant de descendre.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M30 94 L90 94 L90 62 Z\" fill=\"#14181d\"/></svg>"},{"id":"carrefour","cat":"danger","num":"114","name":"Carrefour (intersection)","short":"Carrefour non prioritaire","sens":"Croisement de routes devant toi : les règles générales de priorité s'appliquent (priorité à droite si rien d'autre n'est signalé).","tip":"La croix israélienne est en X (diagonale), pas en + comme en Europe — reconnais-la à l'examen.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g transform=\"rotate(45 60 71)\"><path d=\"M55 48 L65 48 L65 66 L83 66 L83 76 L65 76 L65 94 L55 94 L55 76 L37 76 L37 66 L55 66 Z\" fill=\"#14181d\"/></g></svg>"},{"id":"inter-t","cat":"danger","num":"115","name":"Route latérale à droite","short":"Débouché latéral à droite","sens":"Une route latérale débouche à droite (115) ou à gauche (116). Le trait épais représente TA route.","tip":"À distinguer des panneaux de FUSION (123-126) où aucun virage vers la branche n'est possible : ici c'est un vrai carrefour.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><rect x=\"55\" y=\"46\" width=\"11\" height=\"48\" fill=\"#14181d\"/><rect x=\"66\" y=\"62\" width=\"20\" height=\"8\" fill=\"#14181d\"/></svg>"},{"id":"passage-niveau","cat":"danger","num":"129","name":"Passage à niveau","short":"Voie ferrée plus loin","sens":"Passage à niveau ferroviaire devant toi : ralentis, écoute, et prépare-toi à t'arrêter.","tip":"Israël ne distingue PAS « avec/sans barrière » : une seule locomotive (129) pour tous les passages à niveau. Interdiction de dépasser entre ce panneau et le passage !","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><rect x=\"36\" y=\"60\" width=\"42\" height=\"18\" rx=\"3\" fill=\"#14181d\"/><rect x=\"74\" y=\"48\" width=\"14\" height=\"30\" rx=\"2\" fill=\"#14181d\"/><rect x=\"42\" y=\"50\" width=\"7\" height=\"12\" fill=\"#14181d\"/><circle cx=\"46\" cy=\"42\" r=\"4\" fill=\"#14181d\"/><circle cx=\"54\" cy=\"37\" r=\"5\" fill=\"#14181d\"/><circle cx=\"44\" cy=\"85\" r=\"6\" fill=\"#14181d\"/><circle cx=\"60\" cy=\"85\" r=\"6\" fill=\"#14181d\"/><circle cx=\"78\" cy=\"85\" r=\"6\" fill=\"#14181d\"/></svg>"},{"id":"tram","cat":"danger","num":"128","name":"Train léger (tramway)","short":"Le tram croise la route","sens":"Une rame de train léger (Jérusalem, Tel-Aviv) croise la route devant toi.","tip":"128 = tram moderne avec pantographe ; 129 = train « lourd » (locomotive à vapeur). Deux panneaux différents.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M56 40 L66 48 M66 40 L56 48\" stroke=\"#14181d\" stroke-width=\"3\"/><rect x=\"40\" y=\"48\" width=\"40\" height=\"4\" fill=\"#14181d\"/><rect x=\"38\" y=\"52\" width=\"44\" height=\"34\" rx=\"5\" fill=\"#14181d\"/><rect x=\"44\" y=\"58\" width=\"9\" height=\"10\" fill=\"#ffffff\"/><rect x=\"56\" y=\"58\" width=\"9\" height=\"10\" fill=\"#ffffff\"/><rect x=\"68\" y=\"58\" width=\"8\" height=\"10\" fill=\"#ffffff\"/><rect x=\"34\" y=\"90\" width=\"52\" height=\"4\" fill=\"#14181d\"/></svg>"},{"id":"balise-pn","cat":"danger","num":"130-132","name":"Balises avant passage à niveau","short":"Décompte avant la voie ferrée","sens":"Balises de distance avant un passage à niveau : 3 bandes ≈ 300 m, 2 bandes ≈ 200 m, 1 bande ≈ 100 m.","tip":"Question type : « combien de mètres restent-ils ? » — le nombre de bandes rouges × 100 m.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"41\" y=\"24\" width=\"38\" height=\"74\" rx=\"4\" fill=\"#ffffff\" stroke=\"#b8bec7\" stroke-width=\"2\"/><path d=\"M41 46 L79 30 L79 40 L41 56 Z\" fill=\"#c8102e\"/><path d=\"M41 68 L79 52 L79 62 L41 78 Z\" fill=\"#c8102e\"/><path d=\"M41 90 L79 74 L79 84 L41 96 Z\" fill=\"#c8102e\"/></svg>"},{"id":"croix-pn","cat":"danger","num":"133","name":"Croix de Saint-André","short":"Emplacement du passage à niveau","sens":"Tu es À l'emplacement même du passage à niveau (une seule voie ferrée). La croix double (134) = plusieurs voies.","tip":"129 avertit À L'AVANCE, 133/134 marquent L'ENDROIT. Croix double : attention, un second train peut suivre le premier !","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><g transform=\"rotate(24 60 60)\"><rect x=\"10\" y=\"51\" width=\"100\" height=\"18\" rx=\"4\" fill=\"#ffffff\" stroke=\"#c8102e\" stroke-width=\"4\"/></g><g transform=\"rotate(-24 60 60)\"><rect x=\"10\" y=\"51\" width=\"100\" height=\"18\" rx=\"4\" fill=\"#ffffff\" stroke=\"#c8102e\" stroke-width=\"4\"/></g></svg>"},{"id":"stop-ahead","cat":"danger","num":"139","name":"Stop plus loin","short":"Un STOP arrive","sens":"Un panneau STOP (302) se trouve plus loin : prépare-toi à l'arrêt complet.","tip":"Design purement israélien : l'octogone noir dans le triangle annonce le STOP à main qui arrive.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M50 50 H70 L83 63 V83 L70 96 H50 L37 83 V63 Z\" fill=\"#14181d\"/></svg>"},{"id":"chameau","cat":"danger","num":"146","name":"Animaux (chameau)","short":"Animaux sur la route","sens":"Des animaux peuvent traverser : gazelles, ou chameaux sur les routes du Néguev et de l'Arava.","tip":"La variante chameau est une célébrité de l'examen israélien — les deux pictogrammes (cervidé et chameau) partagent le numéro 146.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M35 72 L35 62 Q35 58 41 58 L47 58 Q55 46 63 58 L70 58 L72 44 Q73 37 78 37 L81 39 L87 41 L82 45 L77 46 L76 58 Q83 60 83 68 L83 72 Z\" fill=\"#14181d\"/><rect x=\"37\" y=\"70\" width=\"5\" height=\"22\" fill=\"#14181d\"/><rect x=\"47\" y=\"70\" width=\"5\" height=\"22\" fill=\"#14181d\"/><rect x=\"68\" y=\"70\" width=\"5\" height=\"22\" fill=\"#14181d\"/><rect x=\"77\" y=\"70\" width=\"5\" height=\"22\" fill=\"#14181d\"/></svg>"},{"id":"chutes-pierres","cat":"danger","num":"142","name":"Chutes de pierres","short":"Éboulements possibles","sens":"Risque de pierres éboulées sur la chaussée, tombant du côté indiqué (142 = droite, 143 = gauche).","tip":"Le QCM peut demander de quel CÔTÉ vient le danger : deux numéros distincts selon le côté.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><path d=\"M40 44 L48 52 L42 60 L50 68 L44 76 L52 84 L46 94 L34 94 L34 44 Z\" fill=\"#14181d\"/><rect x=\"58\" y=\"56\" width=\"9\" height=\"9\" rx=\"2\" fill=\"#14181d\" transform=\"rotate(20 62 60)\"/><rect x=\"70\" y=\"70\" width=\"10\" height=\"10\" rx=\"2\" fill=\"#14181d\" transform=\"rotate(-15 75 75)\"/><rect x=\"60\" y=\"84\" width=\"9\" height=\"9\" rx=\"2\" fill=\"#14181d\" transform=\"rotate(30 64 88)\"/><rect x=\"78\" y=\"88\" width=\"8\" height=\"8\" rx=\"2\" fill=\"#14181d\" transform=\"rotate(10 82 92)\"/></svg>"},{"id":"travaux","cat":"danger","num":"901","name":"Travaux (chantier)","short":"Zone de chantier","sens":"Début d'une zone de travaux sur la route, valable jusqu'au panneau de fin de chantier (902).","tip":"Règle d'or : dans une zone de chantier, le marquage ORANGE au sol PRIME sur le marquage blanc permanent.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><g stroke=\"#14181d\" stroke-width=\"5\" stroke-linecap=\"round\" fill=\"none\"><circle cx=\"56\" cy=\"46\" r=\"6\" fill=\"#14181d\" stroke=\"none\"/><path d=\"M55 52 L52 72\"/><path d=\"M54 58 L74 66 L84 60\"/><path d=\"M52 72 L42 92\"/><path d=\"M52 72 L62 90\"/></g><path d=\"M80 56 L92 78 L72 70 Z\" fill=\"#14181d\"/><path d=\"M30 92 Q40 86 50 92 Q58 96 66 92\" stroke=\"#14181d\" stroke-width=\"4\" fill=\"none\"/></svg>"},{"id":"danger","cat":"danger","num":"150","name":"Danger non spécifié","short":"Danger (nature non précisée)","sens":"Endroit dangereux pour lequel aucun panneau spécifique n'existe : redouble de prudence.","tip":"Réponse type au QCM : « danger dont la nature n'est pas précisée ». Ses voisins : 151 (accident), 152 (vent latéral).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M60 5 L116.5 105 L3.5 105 Z\" fill=\"#c8102e\"/><path d=\"M60 23.5 L102.5 98.5 L17.5 98.5 Z\" fill=\"#ffffff\"/><rect x=\"55\" y=\"46\" width=\"10\" height=\"32\" rx=\"4\" fill=\"#14181d\"/><circle cx=\"60\" cy=\"90\" r=\"6\" fill=\"#14181d\"/></svg>"},{"id":"chevrons","cat":"danger","num":"108","name":"Chevrons de virage","short":"La route tourne — suis les chevrons","sens":"Guidage dans un virage serré : la route continue dans la direction des flèches. Passe DEVANT le panneau.","tip":"En Israël les chevrons sont NOIR et BLANC (pas rouge/blanc comme en France), et ils appartiennent au groupe avertissement malgré leur forme rectangulaire.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"4\" y=\"34\" width=\"112\" height=\"52\" rx=\"6\" fill=\"#14181d\"/><path d=\"M22 42 L44 60 L22 78 L32 78 L54 60 L32 42 Z\" fill=\"#ffffff\"/><path d=\"M52 42 L74 60 L52 78 L62 78 L84 60 L62 42 Z\" fill=\"#ffffff\"/><path d=\"M82 42 L104 60 L82 78 L92 78 L114 60 L92 42 Z\" fill=\"#ffffff\" transform=\"translate(-6 0)\"/></svg>"},{"id":"cedez","cat":"priorite","num":"301","name":"Cédez le passage","short":"Céder le passage","sens":"Cède la priorité à la circulation de la route transversale (y compris une voie ferrée). Tu peux passer SANS t'arrêter si la voie est libre.","tip":"Différence clé avec le STOP : ici, l'arrêt n'est obligatoire que si nécessaire. Seul panneau en triangle pointe en bas — reconnaissable même couvert de neige ou de poussière.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M3.5 15 L116.5 15 L60 115 Z\" fill=\"#c8102e\"/><path d=\"M17.5 21.5 L102.5 21.5 L60 96.5 Z\" fill=\"#ffffff\"/></svg>"},{"id":"stop","cat":"priorite","num":"302","name":"STOP (עצור)","short":"Arrêt complet obligatoire","sens":"Arrêt COMPLET obligatoire, même si tout est libre, puis cède la priorité à la circulation transversale.","tip":"Le STOP israélien = octogone rouge avec une MAIN blanche, sans aucun texte. Implanté à gauche de la chaussée, il ne vaut que pour le tourne-à-gauche ; au-dessus d'une voie, que pour cette voie.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><path d=\"M36 4 H84 L116 36 V84 L84 116 H36 L4 84 V36 Z\" fill=\"#ffffff\"/><path d=\"M38.5 10 H81.5 L110 38.5 V81.5 L81.5 110 H38.5 L10 81.5 V38.5 Z\" fill=\"#c8102e\"/><g fill=\"#ffffff\"><rect x=\"40.5\" y=\"30\" width=\"9\" height=\"36\" rx=\"4.5\"/><rect x=\"51.5\" y=\"25\" width=\"9\" height=\"40\" rx=\"4.5\"/><rect x=\"62.5\" y=\"28\" width=\"9\" height=\"38\" rx=\"4.5\"/><rect x=\"73\" y=\"36\" width=\"8.5\" height=\"30\" rx=\"4.2\"/><path d=\"M40 66 Q30 58 32 51 Q34 45 40 49 L44 54 Z\"/><path d=\"M38 60 L82 60 Q84 82 74 90 Q60 100 47 90 Q37 82 38 60 Z\"/></g></svg>"},{"id":"giratoire","cat":"priorite","num":"303","name":"Carrefour giratoire","short":"Rond-point : céder à l'anneau","sens":"Cède la priorité à la circulation déjà engagée dans l'anneau et contourne l'îlot par la droite.","tip":"Ce panneau unique cumule TROIS fonctions : annonce + céder le passage + contourner par la droite. La priorité est à ceux qui viennent de ta gauche, déjà dans l'anneau.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 62) scale(0.86) translate(-60 -62)\"><g transform=\"rotate(0 60 62)\"><path d=\"M60 34 A26 26 0 0 1 84.5 51\" stroke=\"#ffffff\" stroke-width=\"8\" fill=\"none\"/><path d=\"M88 40 L88 60 L72 49 Z\" fill=\"#ffffff\"/></g><g transform=\"rotate(120 60 62)\"><path d=\"M60 34 A26 26 0 0 1 84.5 51\" stroke=\"#ffffff\" stroke-width=\"8\" fill=\"none\"/><path d=\"M88 40 L88 60 L72 49 Z\" fill=\"#ffffff\"/></g><g transform=\"rotate(240 60 62)\"><path d=\"M60 34 A26 26 0 0 1 84.5 51\" stroke=\"#ffffff\" stroke-width=\"8\" fill=\"none\"/><path d=\"M88 40 L88 60 L72 49 Z\" fill=\"#ffffff\"/></g></g></svg>"},{"id":"passage-pietons-ind","cat":"priorite","num":"306","name":"Passage piétons","short":"Céder aux piétons qui traversent","sens":"Cède la priorité aux piétons qui traversent. Implanté à l'endroit même du passage marqué au sol.","tip":"Officiellement classé PRIORITÉ (pas simple indication). 135 (triangle) avertit avant ; 306 (carré bleu) oblige au passage même.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><path d=\"M60 20 L104 96 L16 96 Z\" fill=\"#ffffff\"/><g transform=\"translate(60 66) scale(1)\" stroke=\"#14181d\" stroke-width=\"5.5\" stroke-linecap=\"round\" fill=\"none\"><circle cx=\"1\" cy=\"-24\" r=\"6.5\" fill=\"#14181d\" stroke=\"none\"/><path d=\"M0 -16 L-1 4\"/><path d=\"M-1 -13 L-11 -2\"/><path d=\"M-1 -13 L9 -6\"/><path d=\"M-1 4 L-10 20\"/><path d=\"M-1 4 L8 19\"/></g><rect x=\"46\" y=\"88\" width=\"9\" height=\"4\" fill=\"#14181d\"/><rect x=\"58\" y=\"88\" width=\"9\" height=\"4\" fill=\"#14181d\"/><rect x=\"70\" y=\"88\" width=\"9\" height=\"4\" fill=\"#14181d\"/></svg>"},{"id":"ceder-face","cat":"priorite","num":"307","name":"Passage étroit : cède au sens inverse","short":"Céder au trafic d'en face","sens":"Dans le passage étroit, cède la priorité à la circulation venant en face.","tip":"La flèche ROUGE représente TON sens = celui qui attend. Rond à bordure rouge = contrainte. Son jumeau favorable est le 308 (carré bleu).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/><g transform=\"translate(48 60) rotate(180) scale(1.1)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#14181d\"/></g><g transform=\"translate(72 60) rotate(0) scale(1.1)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#c8102e\"/></g></svg>"},{"id":"priorite-face","cat":"priorite","num":"308","name":"Passage étroit : tu as la priorité","short":"Priorité sur le trafic d'en face","sens":"Dans le passage étroit, TU as la priorité sur la circulation venant en face.","tip":"Retiens « carré bleu = droit acquis » : 307 (rond rouge) = tu cèdes ; 308 (carré bleu) = tu passes. Paire piège favorite de l'examen.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><g transform=\"translate(74 60) rotate(0) scale(1.25)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#ffffff\"/></g><g transform=\"translate(46 60) rotate(180) scale(1.25)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#c8102e\"/></g></svg>"},{"id":"route-prioritaire","cat":"priorite","num":"309","name":"Route prioritaire","short":"Tu es sur la route prioritaire","sens":"Tu as la priorité sur cette route, jusqu'au prochain carrefour ou échangeur (ou jusqu'au panneau 310).","tip":"Nuance israélienne : la validité s'arrête au PROCHAIN carrefour si le panneau n'est pas répété — contrairement à la France.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"14\" y=\"14\" width=\"92\" height=\"92\" rx=\"8\" fill=\"#ffffff\" transform=\"rotate(45 60 60)\"/><rect x=\"28\" y=\"28\" width=\"64\" height=\"64\" rx=\"4\" fill=\"#ffd400\" stroke=\"#c9a300\" stroke-width=\"1.5\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"fin-priorite","cat":"priorite","num":"310","name":"Fin de route prioritaire","short":"Fin de la priorité","sens":"Fin de la section où tu avais la priorité : retour aux règles générales (priorité à droite en carrefour non signalé).","tip":"Après ce panneau, à un carrefour sans signalisation, c'est la priorité à droite (règle 64) qui s'applique.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"14\" y=\"14\" width=\"92\" height=\"92\" rx=\"8\" fill=\"#ffffff\" transform=\"rotate(45 60 60)\"/><rect x=\"28\" y=\"28\" width=\"64\" height=\"64\" rx=\"4\" fill=\"#ffd400\" stroke=\"#c9a300\" stroke-width=\"1.5\" transform=\"rotate(45 60 60)\"/><rect x=\"12\" y=\"54\" width=\"96\" height=\"12\" fill=\"#5c6b7a\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"route-fermee","cat":"interdiction","num":"401","name":"Route fermée (2 sens)","short":"Fermée dans les deux sens","sens":"Chaussée fermée dans les DEUX sens à tout véhicule. Placé au-dessus d'un feu : aller tout droit interdit.","tip":"401 (cercle vide) ferme la route dans les deux sens ; 402 (barre blanche) interdit seulement l'ENTRÉE — du trafic peut arriver en face. Piège classique.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/></svg>"},{"id":"sens-interdit","cat":"interdiction","num":"402","name":"Sens interdit","short":"Entrée interdite","sens":"Entrée interdite à tout véhicule : typiquement l'entrée d'une rue à sens unique prise à contre-sens.","tip":"« Tout véhicule » inclut les VÉLOS. Ne vaut que pour la chaussée où il est implanté.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><rect x=\"22\" y=\"52.5\" width=\"76\" height=\"15\" rx=\"3\" fill=\"#ffffff\"/></svg>"},{"id":"interdit-moteur","cat":"interdiction","num":"405","name":"Interdit aux véhicules à moteur","short":"Véhicules à moteur interdits","sens":"Entrée interdite à tout véhicule à MOTEUR ; les vélos et les piétons peuvent passer.","tip":"Trio fréquent au QCM : 402 (tout véhicule, même vélo) / 405 (à moteur seulement) / 408 (à moteur sauf deux-roues).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/><g transform=\"translate(60 48) scale(1)\"><path d=\"M-21 4 Q-21 -2 -15 -3 L-9 -4 Q-5 -11 2 -11 L8 -11 Q14 -11 17 -4 Q21 -3 21 2 L21 5 L-21 5 Z\" fill=\"#14181d\"/><circle cx=\"-11\" cy=\"6\" r=\"4.5\" fill=\"#14181d\"/><circle cx=\"11\" cy=\"6\" r=\"4.5\" fill=\"#14181d\"/></g><g transform=\"translate(60 84) scale(1)\" stroke=\"#14181d\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"><circle cx=\"-14\" cy=\"6\" r=\"7.5\"/><circle cx=\"14\" cy=\"6\" r=\"7.5\"/><path d=\"M-14 6 L-4 -5 L7 -5 L14 6 M-4 -5 L-1 6\"/><path d=\"M7 -5 L11 -11 M6 -11 L15 -11\"/></g></svg>"},{"id":"interdit-droite","cat":"interdiction","num":"428","name":"Interdiction de tourner à droite","short":"Défense de tourner à droite","sens":"Défense de tourner à droite au prochain embranchement (valable jusqu'au prochain carrefour inclus).","tip":"Monté AU-DESSUS d'un feu, il interdit aussi le demi-tour. Sinon, seul le virage indiqué est interdit.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/><g transform=\"translate(60 60) scale(-1 1)\"><path d=\"M2 30 L2 -2 Q2 -10 -6 -10 L-12 -10 L-12 -1 L-30 -14 L-12 -27 L-12 -19 L-4 -19 Q11 -19 11 -4 L11 30 Z\" fill=\"#14181d\"/></g><rect x=\"17\" y=\"54\" width=\"86\" height=\"12\" fill=\"#c8102e\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"interdit-gauche","cat":"interdiction","num":"429","name":"Interdiction de tourner à gauche","short":"Défense de tourner à gauche","sens":"Défense de tourner à gauche au prochain embranchement (valable jusqu'au prochain carrefour inclus).","tip":"GROS piège officiel : le 429 seul n'interdit PAS le demi-tour à gauche ! Le demi-tour n'est interdit que par 430/431, par le marquage, ou si le panneau est monté au-dessus d'un feu.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/><g transform=\"translate(60 60) scale(1 1)\"><path d=\"M2 30 L2 -2 Q2 -10 -6 -10 L-12 -10 L-12 -1 L-30 -14 L-12 -27 L-12 -19 L-4 -19 Q11 -19 11 -4 L11 30 Z\" fill=\"#14181d\"/></g><rect x=\"17\" y=\"54\" width=\"86\" height=\"12\" fill=\"#c8102e\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"demi-tour-interdit","cat":"interdiction","num":"431","name":"Demi-tour à gauche interdit","short":"Défense de faire demi-tour","sens":"Défense de faire demi-tour vers la gauche au prochain embranchement.","tip":"Il existe aussi un 430 (demi-tour à DROITE interdit) — le demi-tour à droite existe en Israël entre rues à sens unique parallèles.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/><g transform=\"translate(120 0) scale(-1 1)\"><path d=\"M46 90 L46 56 Q46 38 61 38 Q76 38 76 56 L76 62 L85 62 L70 80 L55 62 L64 62 L64 56 Q64 50 61 50 Q58 50 58 56 L58 90 Z\" fill=\"#14181d\"/></g><rect x=\"17\" y=\"54\" width=\"86\" height=\"12\" fill=\"#c8102e\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"depassement-interdit","cat":"interdiction","num":"420","name":"Dépassement interdit","short":"Défense de dépasser","sens":"Interdit de dépasser un véhicule à moteur de PLUS de deux roues. Valable jusqu'au prochain carrefour ou au panneau 421.","tip":"Nuance très testée : sous ce panneau, dépasser une MOTO ou un VÉLO reste permis (l'interdiction vise les véhicules « à plus de deux roues »).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/><g transform=\"translate(41 60) scale(1.05)\"><path d=\"M-21 4 Q-21 -2 -15 -3 L-9 -4 Q-5 -11 2 -11 L8 -11 Q14 -11 17 -4 Q21 -3 21 2 L21 5 L-21 5 Z\" fill=\"#c8102e\"/><circle cx=\"-11\" cy=\"6\" r=\"4.5\" fill=\"#c8102e\"/><circle cx=\"11\" cy=\"6\" r=\"4.5\" fill=\"#c8102e\"/></g><g transform=\"translate(80 60) scale(1.05)\"><path d=\"M-21 4 Q-21 -2 -15 -3 L-9 -4 Q-5 -11 2 -11 L8 -11 Q14 -11 17 -4 Q21 -3 21 2 L21 5 L-21 5 Z\" fill=\"#14181d\"/><circle cx=\"-11\" cy=\"6\" r=\"4.5\" fill=\"#14181d\"/><circle cx=\"11\" cy=\"6\" r=\"4.5\" fill=\"#14181d\"/></g></svg>"},{"id":"vitesse-50","cat":"interdiction","num":"426","name":"Limitation de vitesse","short":"Vitesse maximale indiquée","sens":"Interdiction de rouler au-dessus du nombre de km/h inscrit.","tip":"Validité : jusqu'au prochain carrefour, ou jusqu'aux panneaux 216/217 (autoroute), 424/425 (agglomération) ou 427. La version 426פ sur fond JAUNE = limitation temporaire de chantier.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#ffffff\"/><text x=\"60\" y=\"78\" text-anchor=\"middle\" font-family=\"Arial,Helvetica,sans-serif\" font-size=\"52\" font-weight=\"bold\" fill=\"#14181d\">50</text></svg>"},{"id":"fin-vitesse","cat":"interdiction","num":"427","name":"Fin de limitation de vitesse","short":"Fin de la vitesse spéciale","sens":"Fin de la vitesse spéciale : on revient à la vitesse par défaut du type de route.","tip":"« Fin de limitation » ≠ vitesse libre ! C'est la vitesse légale du type de route qui redevient applicable (50 ville / 80 interurbain / 90 séparateur / 110 autoroute).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\" stroke=\"#9aa1ab\" stroke-width=\"3\"/><text x=\"60\" y=\"78\" text-anchor=\"middle\" font-family=\"Arial,Helvetica,sans-serif\" font-size=\"50\" font-weight=\"bold\" fill=\"#7b828c\">50</text><rect x=\"10\" y=\"55\" width=\"100\" height=\"10\" fill=\"#9aa1ab\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"stationnement-interdit","cat":"interdiction","num":"432","name":"Stationnement interdit","short":"Défense de stationner","sens":"Stationnement interdit du côté du panneau. L'arrêt bref (montée/descente de passagers) reste permis.","tip":"UNE barre = stationnement interdit (arrêt toléré) ; un X = même l'arrêt est interdit (433). Équivalent au sol : bordure rouge-blanc.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#0e63ae\"/><rect x=\"17\" y=\"54.5\" width=\"86\" height=\"11\" fill=\"#c8102e\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"arret-interdit","cat":"interdiction","num":"433","name":"Arrêt et stationnement interdits","short":"Défense de s'arrêter","sens":"Tout arrêt et tout stationnement interdits du côté du panneau, sauf obligation légale.","tip":"La différence 432/433 est archi-classique à l'examen : une barre = pas de stationnement ; X = pas même un arrêt d'une seconde.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#c8102e\"/><circle cx=\"60\" cy=\"60\" r=\"43.5\" fill=\"#0e63ae\"/><rect x=\"17\" y=\"54.5\" width=\"86\" height=\"11\" fill=\"#c8102e\" transform=\"rotate(45 60 60)\"/><rect x=\"17\" y=\"54.5\" width=\"86\" height=\"11\" fill=\"#c8102e\" transform=\"rotate(-45 60 60)\"/></svg>"},{"id":"tout-droit","cat":"obligation","num":"203","name":"Obligation : tout droit","short":"Continuer tout droit","sens":"Va tout droit. Sous ce panneau, le demi-tour est INTERDIT.","tip":"Les obligations bleues israéliennes sont la série 200 (pas 400). Une flèche JAUNE sur ces panneaux = direction réservée aux transports publics.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 60) rotate(0) scale(1.5)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#ffffff\"/></g></svg>"},{"id":"oblig-droite","cat":"obligation","num":"204","name":"À droite AVANT le panneau","short":"Tourner à droite avant le panneau","sens":"Tourne à droite — vire AVANT le panneau (il est en face de toi).","tip":"Paire piège 204/206 : flèche HORIZONTALE = tourner avant le panneau ; flèche COUDÉE = tourner après. Idem 205/207 à gauche.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 60) rotate(90) scale(1.5)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#ffffff\"/></g></svg>"},{"id":"oblig-droite-apres","cat":"obligation","num":"206","name":"À droite APRÈS le panneau","short":"Tourner à droite après le panneau","sens":"Tourne à droite — vire APRÈS le panneau.","tip":"Question récurrente : « où tournez-vous ? » — la forme de la flèche (droite vs coudée) donne la réponse.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 60) scale(-1 1)\"><path d=\"M2 30 L2 -2 Q2 -10 -6 -10 L-12 -10 L-12 -1 L-30 -14 L-12 -27 L-12 -19 L-4 -19 Q11 -19 11 -4 L11 30 Z\" fill=\"#ffffff\"/></g></svg>"},{"id":"oblig-gauche","cat":"obligation","num":"205","name":"À gauche AVANT le panneau","short":"Tourner à gauche avant le panneau","sens":"Tourne à gauche — vire avant le panneau.","tip":"Le 207 (flèche coudée) impose de tourner APRÈS le panneau.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 60) rotate(-90) scale(1.5)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#ffffff\"/></g></svg>"},{"id":"contournement","cat":"obligation","num":"214","name":"Contournement par la droite","short":"Passer à droite de l'obstacle","sens":"Franchis l'endroit signalé (îlot, obstacle, chantier) par son côté DROIT.","tip":"215 = miroir (par la gauche) ; 213 (deux flèches) = passage permis des DEUX côtés — à ne pas confondre.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 60) rotate(135) scale(1.5)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#ffffff\"/></g></svg>"},{"id":"piste-cyclable","cat":"obligation","num":"","name":"Piste cyclable","short":"Voie réservée aux vélos","sens":"Chemin réservé aux cyclistes : interdit aux autres véhicules et aux piétons s'il existe un trottoir.","tip":"Rond bleu = obligation/réservation. En Israël, les trottinettes électriques doivent aussi utiliser la piste cyclable quand elle existe.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 66) scale(1.15)\" stroke=\"#ffffff\" stroke-width=\"4.5\" fill=\"none\" stroke-linecap=\"round\"><circle cx=\"-17\" cy=\"10\" r=\"12\"/><circle cx=\"17\" cy=\"10\" r=\"12\"/><path d=\"M-17 10 L-8 -8 L8 -8 L17 10 M-8 -8 L2 10 L-17 10\"/><path d=\"M8 -8 L5 -14 M0 -14 L10 -14\"/><path d=\"M-8 -8 L-11 -14 M-15 -14 L-7 -14\"/></g></svg>"},{"id":"chemin-pietons","cat":"obligation","num":"","name":"Chemin piétons","short":"Réservé aux piétons","sens":"Chemin réservé aux piétons : interdit aux véhicules, y compris vélos.","tip":"À distinguer du 306 (carré bleu, priorité aux piétons au passage) : ici c'est un CHEMIN entier réservé.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><circle cx=\"60\" cy=\"60\" r=\"56\" fill=\"#ffffff\"/><circle cx=\"60\" cy=\"60\" r=\"52\" fill=\"#0e63ae\"/><g transform=\"translate(60 62) scale(1.35)\" stroke=\"#ffffff\" stroke-width=\"5.5\" stroke-linecap=\"round\" fill=\"none\"><circle cx=\"1\" cy=\"-24\" r=\"6.5\" fill=\"#ffffff\" stroke=\"none\"/><path d=\"M0 -16 L-1 4\"/><path d=\"M-1 -13 L-11 -2\"/><path d=\"M-1 -13 L9 -6\"/><path d=\"M-1 4 L-10 20\"/><path d=\"M-1 4 L8 19\"/></g></svg>"},{"id":"sens-unique","cat":"indication","num":"618","name":"Sens unique","short":"Rue à sens unique","sens":"Toute la chaussée est à sens unique dans la direction de la flèche, jusqu'au prochain carrefour ou au panneau 145.","tip":"Ne pas confondre avec l'obligation « tout droit » (203, rond bleu) : le 618 (carré) INFORME que toute la rue est à sens unique.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><g transform=\"translate(60 60) rotate(0) scale(1.7)\"><path d=\"M0 -26 L11 -9 L4.5 -9 L4.5 26 L-4.5 26 L-4.5 -9 L-11 -9 Z\" fill=\"#ffffff\"/></g></svg>"},{"id":"impasse","cat":"indication","num":"623","name":"Impasse","short":"Rue sans issue","sens":"La route devant toi est sans issue. Les variantes 624/625 signalent une impasse dans la rue latérale droite/gauche.","tip":"Si le T est déporté sur le côté du panneau, l'impasse concerne la rue LATÉRALE, pas la tienne.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><rect x=\"53\" y=\"38\" width=\"14\" height=\"58\" fill=\"#ffffff\"/><rect x=\"36\" y=\"26\" width=\"48\" height=\"14\" fill=\"#c8102e\"/></svg>"},{"id":"parking","cat":"indication","num":"626","name":"Stationnement autorisé (חניה)","short":"Stationnement autorisé","sens":"Stationnement autorisé — sauf aux arrêts de bus, et là où bordures rouge-blanc ou panneaux d'interdiction s'appliquent.","tip":"Le « P » israélien est la lettre hébraïque ח (het, initiale de חניה). Une bordure rouge-blanc ANNULE l'autorisation du 626.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><text x=\"60\" y=\"86\" text-anchor=\"middle\" font-family=\"Arial,Helvetica,sans-serif\" font-size=\"66\" font-weight=\"bold\" fill=\"#ffffff\">ח</text></svg>"},{"id":"autoroute","cat":"indication","num":"216","name":"Début d'autoroute","short":"Entrée d'autoroute","sens":"Début d'autoroute : interdite aux piétons, vélos, animaux et à tout véhicule ne pouvant rouler à au moins 60 km/h.","tip":"Le seuil de 60 km/h minimum est une question d'examen classique. Vitesse par défaut sur autoroute : 110 km/h (jusqu'à 120 si signalé).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><path d=\"M40 96 L48 34 L52 34 L48 96 Z\" fill=\"#ffffff\"/><path d=\"M80 96 L72 34 L68 34 L72 96 Z\" fill=\"#ffffff\"/><rect x=\"24\" y=\"52\" width=\"72\" height=\"10\" fill=\"#ffffff\"/><rect x=\"28\" y=\"62\" width=\"8\" height=\"8\" fill=\"#ffffff\"/><rect x=\"84\" y=\"62\" width=\"8\" height=\"8\" fill=\"#ffffff\"/></svg>"},{"id":"fin-autoroute","cat":"indication","num":"217","name":"Fin d'autoroute","short":"Sortie d'autoroute","sens":"Fin de l'autoroute et de ses règles.","tip":"Après ce panneau, la vitesse par défaut redevient celle du type de route (80/90 interurbain, 50 si tu entres en ville).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><path d=\"M40 96 L48 34 L52 34 L48 96 Z\" fill=\"#ffffff\"/><path d=\"M80 96 L72 34 L68 34 L72 96 Z\" fill=\"#ffffff\"/><rect x=\"24\" y=\"52\" width=\"72\" height=\"10\" fill=\"#ffffff\"/><rect x=\"28\" y=\"62\" width=\"8\" height=\"8\" fill=\"#ffffff\"/><rect x=\"84\" y=\"62\" width=\"8\" height=\"8\" fill=\"#ffffff\"/><rect x=\"8\" y=\"54\" width=\"104\" height=\"12\" fill=\"#c8102e\" transform=\"rotate(45 60 60)\"/></svg>"},{"id":"zone-residentielle","cat":"indication","num":"220","name":"Rue résidentielle partagée","short":"Rue partagée piétons-voitures","sens":"Rue où piétons et véhicules cohabitent sur la chaussée : conduite très lente, prudence maximale (enfants qui jouent), stationnement uniquement aux emplacements aménagés.","tip":"Dans un רחוב משולב, le piéton peut utiliser TOUTE la largeur de la rue — tu dois pouvoir t'arrêter immédiatement. Fin de zone : panneau 221 (barré).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><path d=\"M30 52 L52 34 L74 52 L74 74 L30 74 Z\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"4.5\"/><g transform=\"translate(88 62) scale(0.62)\" stroke=\"#ffffff\" stroke-width=\"5.5\" stroke-linecap=\"round\" fill=\"none\"><circle cx=\"1\" cy=\"-24\" r=\"6.5\" fill=\"#ffffff\" stroke=\"none\"/><path d=\"M0 -16 L-1 4\"/><path d=\"M-1 -13 L-11 -2\"/><path d=\"M-1 -13 L9 -6\"/><path d=\"M-1 4 L-10 20\"/><path d=\"M-1 4 L8 19\"/></g><circle cx=\"86\" cy=\"86\" r=\"4.5\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"3\"/><rect x=\"26\" y=\"84\" width=\"30\" height=\"10\" rx=\"3\" fill=\"#ffffff\"/><circle cx=\"33\" cy=\"96\" r=\"4\" fill=\"#ffffff\"/><circle cx=\"49\" cy=\"96\" r=\"4\" fill=\"#ffffff\"/></svg>"},{"id":"maison-rouge","cat":"indication","num":"424","name":"Entrée d'agglomération","short":"Zone urbaine : 50 km/h","sens":"Début d'une zone de routes urbaines : piétons, stationnement, écoles… Vitesse par défaut : 50 km/h.","tip":"Le fameux « panneau à la maison rouge » : maison rouge = ville = 50 km/h. Le 425 (barré) marque la sortie → retour aux vitesses interurbaines.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><path d=\"M28 62 L60 34 L92 62 L92 96 L28 96 Z\" fill=\"#c8102e\" stroke=\"#ffffff\" stroke-width=\"4\" stroke-linejoin=\"round\"/><rect x=\"52\" y=\"72\" width=\"16\" height=\"24\" fill=\"#ffffff\"/></svg>"},{"id":"sortie-agglo","cat":"indication","num":"425","name":"Sortie d'agglomération","short":"Fin de zone urbaine","sens":"Fin de la zone de routes urbaines.","tip":"Après le 425 : 80 km/h par défaut sur route interurbaine (90 avec séparateur central), sauf signalisation.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><path d=\"M28 62 L60 34 L92 62 L92 96 L28 96 Z\" fill=\"#c8102e\" stroke=\"#ffffff\" stroke-width=\"4\" stroke-linejoin=\"round\"/><rect x=\"52\" y=\"72\" width=\"16\" height=\"24\" fill=\"#ffffff\"/><rect x=\"8\" y=\"54\" width=\"104\" height=\"12\" fill=\"#ffffff\" transform=\"rotate(45 60 60)\" opacity=\"0.92\"/></svg>"},{"id":"voie-bus","cat":"indication","num":"501","name":"Voie réservée aux transports publics","short":"Voie bus (נת\"צ)","sens":"Voie réservée : les pictogrammes indiquent qui peut y rouler. Arrêt et stationnement interdits dans la voie.","tip":"Nuance très testée : bus JAUNE = seulement les bus de LIGNE ; bus BLANC = tous les autobus. Sans panonceau d'horaires, la réservation vaut 24h/24. Au sol : lignes jaunes + losanges.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"6\" y=\"6\" width=\"108\" height=\"108\" rx=\"10\" fill=\"#ffffff\"/><rect x=\"10\" y=\"10\" width=\"100\" height=\"100\" rx=\"7\" fill=\"#0e63ae\"/><rect x=\"20\" y=\"42\" width=\"80\" height=\"34\" rx=\"7\" fill=\"#f5c500\"/><rect x=\"27\" y=\"48\" width=\"15\" height=\"12\" rx=\"2\" fill=\"#0e63ae\"/><rect x=\"46\" y=\"48\" width=\"15\" height=\"12\" rx=\"2\" fill=\"#0e63ae\"/><rect x=\"65\" y=\"48\" width=\"15\" height=\"12\" rx=\"2\" fill=\"#0e63ae\"/><rect x=\"84\" y=\"48\" width=\"10\" height=\"12\" rx=\"2\" fill=\"#0e63ae\"/><circle cx=\"36\" cy=\"80\" r=\"7\" fill=\"#ffffff\"/><circle cx=\"84\" cy=\"80\" r=\"7\" fill=\"#ffffff\"/><rect x=\"24\" y=\"92\" width=\"72\" height=\"7\" rx=\"3.5\" fill=\"#ffffff\"/></svg>"},{"id":"ligne-discontinue","cat":"marquage","num":"801","name":"Ligne discontinue","short":"Franchissable pour dépasser","sens":"Ligne de voie : roule dans la voie la plus à droite ; ne franchis la ligne que pour dépasser ou éviter, avec prudence.","tip":"Franchissable, mais uniquement pour une manœuvre justifiée — pas pour rouler à cheval sur deux voies.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"120\" fill=\"#4d545e\"/><rect x=\"56\" y=\"6\" width=\"8\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"56\" y=\"36\" width=\"8\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"56\" y=\"66\" width=\"8\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"56\" y=\"96\" width=\"8\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/></svg>"},{"id":"ligne-continue","cat":"marquage","num":"803","name":"Ligne continue (double)","short":"Interdiction de franchir","sens":"Ligne de séparation continue : roule à sa droite, interdiction ABSOLUE de la franchir ou de la chevaucher, même partiellement.","tip":"Depuis la version 2022 du catalogue, elle est définie comme DOUBLE ligne blanche. Même une roue ou un rétroviseur qui dépasse = infraction.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"120\" fill=\"#4d545e\"/><rect x=\"49\" y=\"0\" width=\"6\" height=\"120\" fill=\"#ffffff\"/><rect x=\"63\" y=\"0\" width=\"6\" height=\"120\" fill=\"#ffffff\"/></svg>"},{"id":"ligne-mixte","cat":"marquage","num":"806","name":"Ligne mixte (continue + discontinue)","short":"Franchissable selon ton côté","sens":"Le franchissement n'est autorisé que si la ligne DISCONTINUE est de TON côté et si la voie est libre.","tip":"Règle simple : c'est la ligne la plus proche de toi qui compte. Discontinue de ton côté = dépassement possible ; continue = interdit.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"120\" fill=\"#4d545e\"/><rect x=\"50\" y=\"0\" width=\"6\" height=\"120\" fill=\"#ffffff\"/><rect x=\"63\" y=\"6\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"63\" y=\"36\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"63\" y=\"66\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"63\" y=\"96\" width=\"6\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/></svg>"},{"id":"ligne-jaune","cat":"marquage","num":"807","name":"Ligne jaune continue (rive)","short":"Bord de chaussée (accotement)","sens":"Marque le bord de la chaussée sur route interurbaine : roule à sa gauche ; ne passe à sa droite que pour éviter un accident ou rouler lentement sans gêner.","tip":"Piège d'examen : la ligne jaune israélienne n'est PAS une séparation de sens — elle délimite l'ACCOTEMENT (שול).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"120\" fill=\"#4d545e\"/><rect x=\"14\" y=\"0\" width=\"7\" height=\"120\" fill=\"#ffd400\"/></svg>"},{"id":"ligne-orange","cat":"marquage","num":"918+","name":"Marquage orange (chantier)","short":"Marquage temporaire de travaux","sens":"Marquage temporaire de zone de travaux : mêmes formes que le marquage blanc, mais en orange.","tip":"Règle d'or : en zone de chantier, le marquage ORANGE PRIME sur le marquage blanc permanent.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"120\" fill=\"#4d545e\"/><rect x=\"40\" y=\"6\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"40\" y=\"36\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"40\" y=\"66\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"40\" y=\"96\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ffffff\"/><rect x=\"70\" y=\"6\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ff7900\"/><rect x=\"70\" y=\"36\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ff7900\"/><rect x=\"70\" y=\"66\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ff7900\"/><rect x=\"70\" y=\"96\" width=\"7\" height=\"18\" rx=\"2\" fill=\"#ff7900\"/></svg>"},{"id":"ligne-arret","cat":"marquage","num":"810","name":"Ligne d'arrêt","short":"S'arrêter avant la ligne","sens":"Ligne blanche en travers de la voie : c'est LÀ qu'on s'arrête (stop, feu rouge, passage à niveau) — avant la ligne et près d'elle.","tip":"Au stop ou au feu rouge : arrêt AVANT la ligne, jamais dessus. Sans ligne : avant le passage piétons.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"120\" fill=\"#4d545e\"/><rect x=\"0\" y=\"66\" width=\"120\" height=\"14\" fill=\"#ffffff\"/><rect x=\"10\" y=\"20\" width=\"14\" height=\"34\" fill=\"#ffffff\"/><rect x=\"38\" y=\"20\" width=\"14\" height=\"34\" fill=\"#ffffff\"/><rect x=\"66\" y=\"20\" width=\"14\" height=\"34\" fill=\"#ffffff\"/><rect x=\"94\" y=\"20\" width=\"14\" height=\"34\" fill=\"#ffffff\"/></svg>"},{"id":"bordure-rouge-blanc","cat":"marquage","num":"818","name":"Bordure rouge-blanc","short":"Ni arrêt ni stationnement","sens":"Arrêt ET stationnement interdits le long de ces bordures.","tip":"LE point d'examen : rouge-blanc = ni arrêt ni stationnement (pas seulement le stationnement). Le remorquage y est fréquent.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"46\" fill=\"#c9ced6\"/><rect x=\"0\" y=\"46\" width=\"20\" height=\"26\" fill=\"#c8102e\"/><rect x=\"20\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"40\" y=\"46\" width=\"20\" height=\"26\" fill=\"#c8102e\"/><rect x=\"60\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"80\" y=\"46\" width=\"20\" height=\"26\" fill=\"#c8102e\"/><rect x=\"100\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"0\" y=\"72\" width=\"120\" height=\"48\" fill=\"#4d545e\"/></svg>"},{"id":"bordure-bleu-blanc","cat":"marquage","num":"817","name":"Bordure bleu-blanc","short":"Stationnement payant réglementé","sens":"Stationnement autorisé mais PAYANT/réglementé, selon les conditions du panneau municipal à proximité (heures, jours, résidents).","tip":"Hors des heures affichées, souvent gratuit — mais vérifie toujours si la zone est réservée aux résidents.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"46\" fill=\"#c9ced6\"/><rect x=\"0\" y=\"46\" width=\"20\" height=\"26\" fill=\"#0e63ae\"/><rect x=\"20\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"40\" y=\"46\" width=\"20\" height=\"26\" fill=\"#0e63ae\"/><rect x=\"60\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"80\" y=\"46\" width=\"20\" height=\"26\" fill=\"#0e63ae\"/><rect x=\"100\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"0\" y=\"72\" width=\"120\" height=\"48\" fill=\"#4d545e\"/></svg>"},{"id":"bordure-rouge-jaune","cat":"marquage","num":"511","name":"Bordure rouge-jaune","short":"Arrêt de bus / taxis","sens":"Emplacement réservé à un type de véhicule (bus de ligne, taxis) pour la montée/descente de passagers : arrêt interdit à tous les autres.","tip":"Rouge-jaune = arrêt de bus ou station de taxis : ni arrêt ni stationnement, même « juste une minute ».","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"46\" fill=\"#c9ced6\"/><rect x=\"0\" y=\"46\" width=\"20\" height=\"26\" fill=\"#c8102e\"/><rect x=\"20\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffd400\"/><rect x=\"40\" y=\"46\" width=\"20\" height=\"26\" fill=\"#c8102e\"/><rect x=\"60\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffd400\"/><rect x=\"80\" y=\"46\" width=\"20\" height=\"26\" fill=\"#c8102e\"/><rect x=\"100\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffd400\"/><rect x=\"0\" y=\"72\" width=\"120\" height=\"48\" fill=\"#4d545e\"/></svg>"},{"id":"bordure-noir-blanc","cat":"marquage","num":"816","name":"Bordure noir-blanc","short":"Mise en évidence d'un obstacle","sens":"Marquage de visibilité des îlots, refuges et terre-pleins — ce n'est pas une règle de stationnement en soi.","tip":"Réponse attendue : noir-blanc = signalisation d'un OBSTACLE (îlot, terre-plein), pas une couleur de stationnement.","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"46\" fill=\"#c9ced6\"/><rect x=\"0\" y=\"46\" width=\"20\" height=\"26\" fill=\"#22262b\"/><rect x=\"20\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"40\" y=\"46\" width=\"20\" height=\"26\" fill=\"#22262b\"/><rect x=\"60\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"80\" y=\"46\" width=\"20\" height=\"26\" fill=\"#22262b\"/><rect x=\"100\" y=\"46\" width=\"20\" height=\"26\" fill=\"#ffffff\"/><rect x=\"0\" y=\"72\" width=\"120\" height=\"48\" fill=\"#4d545e\"/></svg>"},{"id":"bordure-grise","cat":"marquage","num":"","name":"Bordure non peinte","short":"Stationnement libre par défaut","sens":"Bordure sans peinture : stationnement en principe autorisé et gratuit, sauf panneau contraire ou règle générale.","tip":"« Libre » ne veut pas dire partout : les interdictions générales restent (12 m d'un carrefour, passage piétons, arrêt de bus…).","svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 120 120\"><rect x=\"0\" y=\"0\" width=\"120\" height=\"46\" fill=\"#c9ced6\"/><rect x=\"0\" y=\"46\" width=\"20\" height=\"26\" fill=\"#8d939c\"/><rect x=\"20\" y=\"46\" width=\"20\" height=\"26\" fill=\"#8d939c\"/><rect x=\"40\" y=\"46\" width=\"20\" height=\"26\" fill=\"#8d939c\"/><rect x=\"60\" y=\"46\" width=\"20\" height=\"26\" fill=\"#8d939c\"/><rect x=\"80\" y=\"46\" width=\"20\" height=\"26\" fill=\"#8d939c\"/><rect x=\"100\" y=\"46\" width=\"20\" height=\"26\" fill=\"#8d939c\"/><rect x=\"0\" y=\"72\" width=\"120\" height=\"48\" fill=\"#4d545e\"/></svg>"}];

/* ================= DONNÉES : LEÇONS (rempli après vérification) ================= */
const LESSONS = [{"icon":"🪧","title":"Reconnaître les familles de panneaux","sub":"La logique des formes et des couleurs — commence ici","body":"\n<p>Avant d'apprendre chaque panneau, apprends la <b>logique</b> : la forme et la couleur te disent déjà 80 % du message.</p>\n<table>\n<tr><th>Forme / couleur</th><th>Famille</th><th>Exemple</th></tr>\n<tr><td>🔺 Triangle, bordure rouge, fond blanc</td><td><b>Danger</b> (série 100)</td><td>Virage, passage piétons, chameau…</td></tr>\n<tr><td>🔻 Triangle pointe en bas</td><td><b>Cédez le passage</b> (301)</td><td>Le seul de sa forme — reconnaissable même sale</td></tr>\n<tr><td>🛑 Octogone rouge + main blanche</td><td><b>STOP</b> (302)</td><td>Spécificité israélienne : une main, pas de texte</td></tr>\n<tr><td>🔴 Rond, bordure rouge</td><td><b>Interdiction</b> (série 400)</td><td>Vitesse, sens interdit, dépassement…</td></tr>\n<tr><td>🔵 Rond bleu</td><td><b>Obligation</b> (série 200)</td><td>Tout droit, contournement, rond-point…</td></tr>\n<tr><td>🟦 Carré / rectangle bleu</td><td><b>Indication</b></td><td>Sens unique, parking ח, impasse…</td></tr>\n<tr><td>🟡 Losange jaune</td><td><b>Route prioritaire</b> (309)</td><td>Tu as la priorité jusqu'au prochain carrefour</td></tr>\n</table>\n<div class=\"keyfact\">🇮🇱 <b>Spécificités israéliennes à retenir :</b> le STOP à main ✋, le carrefour en <b>X</b> (114), la « maison rouge » d'entrée de ville (424), le parking marqué <b>ח</b> (pas P), les chevrons de virage <b>noirs et blancs</b>, et le panneau chameau 🐪 (146).</div>\n<div class=\"keyfact\">🟠 Un panneau avec suffixe <b>פ</b> sur fond jaune = version <b>temporaire de chantier</b>. Le marquage <b>orange</b> au sol prime toujours sur le blanc.</div>"},{"icon":"🚦","title":"Les feux de circulation","sub":"Séquence israélienne, vert clignotant, jaune clignotant","body":"\n<p>La séquence israélienne comporte une étape de plus qu'en France :</p>\n<ul>\n<li>🔴 <b>Rouge</b> : arrêt complet avant la ligne d'arrêt.</li>\n<li>🔴🟡 <b>Rouge + jaune ensemble</b> : « prépare-toi à démarrer » — mais il est <b>interdit de passer</b> tant que le vert n'est pas allumé.</li>\n<li>🟢 <b>Vert</b> : passe — si le carrefour peut être dégagé.</li>\n<li>🟢✨ <b>Vert clignotant</b> : le vert clignote <b>3 fois pendant les 3 dernières secondes</b> avant le jaune. Il n'existe que sur les routes où la vitesse autorisée dépasse <b>60 km/h</b>. Juridiquement c'est encore un feu vert.</li>\n<li>🟡 <b>Jaune</b> : arrête-toi, sauf si tu es trop engagé pour t'arrêter en sécurité.</li>\n</ul>\n<div class=\"keyfact\">🟡 <b>Jaune clignotant</b> = le feu est <b>hors service</b> : avance avec prudence en suivant les panneaux et les règles de priorité.</div>\n<div class=\"keyfact\">📏 Les instructions d'un <b>feu</b> priment sur les <b>panneaux</b> — SAUF quand le feu est en jaune clignotant.</div>\n<div class=\"warnfact\">🚫 Interdit d'entrer dans un carrefour (même au vert !) si tu ne peux pas le <b>traverser et le dégager entièrement</b>.</div>"},{"icon":"⚖️","title":"Les priorités","sub":"Priorité à droite, ronds-points, urgences, piétons","body":"\n<h4>Règles de base</h4>\n<ul>\n<li>Carrefour sans signalisation : priorité au véhicule venant de <b>droite</b>.</li>\n<li>Celui qui <b>tourne à gauche</b> cède aux véhicules venant en face.</li>\n<li>Celui qui sort d'un <b>chemin de terre</b> cède à la route revêtue.</li>\n<li><b>Rond-point</b> : celui qui entre cède à ceux <b>déjà dans l'anneau</b> (le trafic venant de ta gauche).</li>\n</ul>\n<h4>Véhicules d'urgence (רכב ביטחון)</h4>\n<p>Police, ambulance, pompiers ou Tsahal avec sirène et gyrophare : <b>range-toi le plus à droite possible, hors du carrefour, et ARRÊTE-toi</b> jusqu'à leur passage. Interdiction de suivre un véhicule d'urgence à moins de 100 m.</p>\n<h4>Piétons</h4>\n<ul>\n<li>Passage piétons : laisse les piétons engagés <b>terminer leur traversée</b>, arrête-toi si nécessaire.</li>\n<li>Tu dois <b>ralentir dès qu'un piéton attend au bord</b> avec l'intention manifeste de traverser, et lui céder le passage.</li>\n<li>Bus arrêté qui fait monter/descendre des passagers : <b>ralentis, arrête-toi si nécessaire</b>.</li>\n</ul>\n<div class=\"warnfact\">🚌 Un bus qui signale sa sortie d'un arrêt : facilite-lui l'insertion — mais c'est une <b>courtoisie recommandée</b>, pas une priorité légale.</div>"},{"icon":"🚗","title":"Vitesses et distances","sub":"Les chiffres à connaître par cœur","body":"\n<table>\n<tr><th>Type de route</th><th>Par défaut</th><th>Max si signalé</th></tr>\n<tr><td>Agglomération (après la « maison rouge » 424)</td><td><b>50</b> km/h</td><td>80</td></tr>\n<tr><td>Route interurbaine sans séparation</td><td><b>80</b> km/h</td><td>100</td></tr>\n<tr><td>Route interurbaine avec séparation construite</td><td><b>90</b> km/h</td><td>110</td></tr>\n<tr><td>Autoroute (דרך מהירה)</td><td><b>110</b> km/h</td><td>120</td></tr>\n</table>\n<p class=\"muted\">Route 6 (péage) : 110 sur la majorité du tracé, 120 sur la section centrale — suis la signalisation.</p>\n<h4>Distance de sécurité</h4>\n<ul>\n<li>Minimum <b>légal</b> : <b>1 seconde</b> d'écart avec le véhicule qui précède.</li>\n<li>Standard enseigné (et attendu à l'examen pratique) : <b>2 secondes</b> — <b>3 secondes</b> par mauvais temps.</li>\n<li>Compte « vingt-et-un, vingt-deux » quand le véhicule devant passe un repère fixe.</li>\n</ul>\n<div class=\"keyfact\">⚠️ Quelle que soit la limite affichée, tu dois <b>adapter la vitesse aux conditions</b> : ralentir près des écoles, passages piétons, virages, sommets de côte, par pluie…</div>\n<h4>Dépassement</h4>\n<ul>\n<li>On dépasse <b>uniquement par la gauche</b>, si la route est dégagée et la visibilité suffisante.</li>\n<li>Interdit : sur ligne continue, à l'approche d'un <b>passage piétons</b>, entre le panneau de <b>passage à niveau</b> et le passage, dans un carrefour, ou sans visibilité.</li>\n</ul>"},{"icon":"🅿️","title":"Arrêt, stationnement et bordures","sub":"Les couleurs de trottoirs + les distances interdites","body":
