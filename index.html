"\n<h4>Les bordures peintes — à connaître PAR CŒUR</h4>\n<table>\n<tr><th>Bordure</th><th>Signification</th></tr>\n<tr><td><span class=\"curb\" style=\"background:repeating-linear-gradient(90deg,#c8102e 0 11px,#fff 11px 22px)\"></span>Rouge-blanc</td><td><b>Arrêt ET stationnement interdits</b></td></tr>\n<tr><td><span class=\"curb\" style=\"background:repeating-linear-gradient(90deg,#0e63ae 0 11px,#fff 11px 22px)\"></span>Bleu-blanc</td><td>Stationnement <b>payant/réglementé</b> (panneau municipal)</td></tr>\n<tr><td><span class=\"curb\" style=\"background:repeating-linear-gradient(90deg,#c8102e 0 11px,#ffd400 11px 22px)\"></span>Rouge-jaune</td><td>Arrêt de <b>bus / taxis</b> uniquement</td></tr>\n<tr><td><span class=\"curb\" style=\"background:repeating-linear-gradient(90deg,#22262b 0 11px,#fff 11px 22px)\"></span>Noir-blanc</td><td>Mise en évidence d'un <b>obstacle</b> (îlot, terre-plein)</td></tr>\n<tr><td><span class=\"curb\" style=\"background:#8d939c\"></span>Non peinte</td><td>Libre par défaut (sauf panneaux et règles générales)</td></tr>\n</table>\n<h4>Distances d'interdiction (règle 72)</h4>\n<ul>\n<li>Dans un carrefour et à moins de <b>12 m</b> de celui-ci.</li>\n<li>Sur un passage piétons et dans les <b>12 m AVANT</b> lui.</li>\n<li>À moins de <b>20 m</b> d'un passage à niveau.</li>\n<li>Dans la zone d'un <b>arrêt de bus</b> (~20 m de part et d'autre).</li>\n</ul>\n<div class=\"keyfact\">🪧 Panneau 432 (une barre) = stationnement interdit, arrêt bref toléré. Panneau 433 (X) = même s'arrêter est interdit.</div>"},{"icon":"🛡️","title":"Conduite et sécurité","sub":"Alcool, ceintures, enfants, téléphone, phares, gilet","body":"\n<h4>Alcool</h4>\n<ul>\n<li>Limite générale : <b>240 µg</b> d'alcool par litre d'air expiré (≈ 0,05 %).</li>\n<li>Conducteurs de <b>moins de 24 ans</b>, <b>nouveaux conducteurs</b> et <b>professionnels</b> : <b>50 µg</b> — quasi tolérance zéro. Un seul verre suffit à dépasser.</li>\n</ul>\n<h4>Ceintures et enfants</h4>\n<ul>\n<li>Ceinture obligatoire pour <b>tous</b>, à l'avant comme à l'arrière.</li>\n<li>Bébé de <b>moins d'1 an</b> : siège bébé <b>dos à la route</b> (jamais devant un airbag actif).</li>\n<li>Jusqu'à <b>3 ans</b> : siège enfant homologué.</li>\n<li>De <b>3 à 8 ans</b> : siège ou <b>rehausseur</b>.</li>\n<li>À partir de <b>8 ans</b> : ceinture du véhicule.</li>\n</ul>\n<h4>Téléphone</h4>\n<p>Interdit de tenir ou toucher le téléphone en conduisant : uniquement <b>kit mains libres</b>, téléphone <b>fixé</b>. Amende type : 1 000 ₪ et 8 points.</p>\n<h4>Phares et gilet</h4>\n<ul>\n<li>Du <b>1er novembre au 31 mars</b> : feux de croisement allumés <b>de jour</b> sur route <b>interurbaine</b> (motos : toute l'année).</li>\n<li><b>Gilet réfléchissant</b> : obligatoire dans l'habitacle, et à porter dès qu'on sort du véhicule sur route <b>non urbaine</b>.</li>\n</ul>"},{"icon":"🎓","title":"L'examen théorie en pratique","sub":"Format, langues, inscription — et comment réviser en 5 jours","body":"\n<h4>Le format</h4>\n<ul>\n<li>QCM sur ordinateur : <b>30 questions</b>, 4 réponses possibles, une seule correcte.</li>\n<li>Réussite : <b>26 bonnes réponses</b> minimum (4 erreurs max).</li>\n<li>Durée : <b>40 minutes</b>. Résultat affiché immédiatement.</li>\n<li>L'examen existe en <b>7 langues, dont le FRANÇAIS</b> 🇫🇷 (hébreu, arabe, russe, amharique, anglais, français, espagnol).</li>\n</ul>\n<h4>Inscription et jour J</h4>\n<ul>\n<li>Prérequis : dossier ouvert (« formulaire vert », avec test de vue chez un optométriste agréé).</li>\n<li>Inscription en ligne sur <b>theorytest.org.il</b> — 22 centres dans le pays. Taxe : <b>76 ₪</b> (à repayer à chaque tentative).</li>\n<li>Arrive <b>15 minutes en avance</b>. Sacs et téléphones interdits en salle (casiers fournis).</li>\n<li>⚠️ Depuis le 1er février 2026 : <b>pièce d'identité BIOMÉTRIQUE</b> obligatoire (teoudat zehout à puce, passeport israélien valide ou permis).</li>\n<li>Le résultat reste valable <b>5 ans</b>. En cas de désaccord, contestation en ligne sous 7 jours ouvrés.</li>\n</ul>\n<h4>Réviser en 5 jours — la méthode</h4>\n<div class=\"keyfact\">💡 Toutes les questions de l'examen sont tirées de la <b>banque officielle publiée</b> par le ministère — il n'y a pas de questions surprises. Après avoir compris la théorie ici, enchaîne les simulations dans la langue de ton examen jusqu'à obtenir 28+/30 de façon stable.</div>\n<ul>\n<li>Banque officielle : gov.il (מאגר השאלות) — interface hébreu/anglais.</li>\n<li><b>En français : meteoria.co.il</b> propose les questions officielles traduites (aussi : test4u.co.il, easyteo.co.il, testil.com en hébreu).</li>\n</ul>\n<p class=\"muted\">Titulaires d'un permis étranger : la conversion se fait normalement SANS examen théorique (permis ≥ 5 ans : sur documents ; &lt; 5 ans : test pratique de contrôle). La théorie n'est exigée qu'après deux échecs au pratique — ou pour un premier permis.</p>"}];

const THEORY_QUESTIONS = [{"q":"En agglomération, sans panneau de limitation, la vitesse maximale est de :","choices":["50 km/h","60 km/h","70 km/h","40 km/h"],"answer":0,"explain":"En zone urbaine (après le panneau « maison rouge » 424), la limite par défaut est de 50 km/h."},{"q":"Sur autoroute, sans signalisation particulière, la vitesse maximale est de :","choices":["110 km/h","120 km/h","100 km/h","90 km/h"],"answer":0,"explain":"110 km/h par défaut sur autoroute ; la signalisation peut la porter à 120 km/h maximum (ex. section centrale de la Route 6)."},{"q":"Sur une route interurbaine SANS séparation centrale, la vitesse par défaut est de :","choices":["80 km/h","90 km/h","100 km/h","70 km/h"],"answer":0,"explain":"80 km/h sans séparation ; 90 km/h avec séparation construite ; 110 sur autoroute."},{"q":"Le feu vert se met à clignoter. Cela signifie :","choices":["Le vert se termine : le jaune arrive dans 3 secondes","Le feu est en panne","Passage réservé aux transports publics","Il faut accélérer pour passer"],"answer":0,"explain":"Le vert clignote 3 fois pendant les 3 dernières secondes avant le jaune — uniquement sur les routes où la vitesse dépasse 60 km/h. C'est légalement encore un feu vert."},{"q":"Rouge et jaune allumés ensemble signifient :","choices":["Prépare-toi à démarrer, mais ne passe pas encore","Tu peux passer prudemment","Le feu est hors service","Arrêt réservé aux bus"],"answer":0,"explain":"La séquence israélienne comprend rouge+jaune avant le vert : préparation au démarrage, franchissement toujours interdit."},{"q":"Un feu JAUNE CLIGNOTANT signifie :","choices":["Feu hors service : avance selon les panneaux et les priorités","Prépare-toi à t'arrêter","Priorité aux piétons uniquement","Danger : route fermée"],"answer":0,"explain":"Jaune clignotant = feu pas en service. On obéit alors aux panneaux et aux règles de priorité."},{"q":"À un carrefour sans aucune signalisation, qui a la priorité ?","choices":["Le véhicule venant de droite","Le véhicule venant de gauche","Le plus rapide","Celui qui va tout droit, toujours"],"answer":0,"explain":"Règle 64 : à intersection non signalée, on cède au véhicule venant de la droite."},{"q":"À l'entrée d'un rond-point, tu dois :","choices":["Céder la priorité aux véhicules déjà dans l'anneau","Passer en premier si tu viens de droite","T'arrêter complètement dans tous les cas","Klaxonner avant d'entrer"],"answer":0,"explain":"Celui qui entre cède à ceux qui circulent déjà dans l'anneau, puis contourne l'îlot par la droite (panneau 303)."},{"q":"Une ambulance arrive derrière toi, sirène et gyrophare allumés. Tu dois :","choices":["Te ranger le plus à droite possible, hors du carrefour, et t'arrêter","Accélérer pour libérer la route","Continuer normalement","Freiner sur place immédiatement"],"answer":0,"explain":"Règle 93 : se ranger à droite hors intersection et s'ARRÊTER jusqu'au passage du véhicule d'urgence. Interdit de le suivre à moins de 100 m."},{"q":"L'écart MINIMUM légal avec le véhicule qui précède est de :","choices":["1 seconde","2 secondes","3 secondes","10 mètres dans tous les cas"],"answer":0,"explain":"Le minimum légal (règle 49) est de 1 seconde ; le standard enseigné est 2 secondes, et 3 par mauvais temps."},{"q":"Limite d'alcoolémie pour un NOUVEAU conducteur ou un conducteur de moins de 24 ans :","choices":["50 µg par litre d'air expiré (quasi zéro)","240 µg par litre d'air expiré","Un verre de vin autorisé","Aucune limite spécifique"],"answer":0,"explain":"Jeunes (<24 ans), nouveaux conducteurs et professionnels : 50 µg/L — la limite générale est de 240 µg/L (≈0,05 %)."},{"q":"Un enfant de 5 ans doit voyager :","choices":["Dans un siège ou rehausseur adapté","Avec la ceinture seule à l'arrière","Sur les genoux d'un adulte ceinturé","À l'avant obligatoirement"],"answer":0,"explain":"De 3 à 8 ans : siège enfant ou rehausseur. Ceinture seule à partir de 8 ans."},{"q":"Un bébé de 8 mois doit être installé :","choices":["Dos à la route, jamais devant un airbag actif","Face à la route à l'arrière","Face à la route à l'avant","Dans un rehausseur"],"answer":0,"explain":"Moins d'1 an : siège bébé dos à la route ; interdit à l'avant si l'airbag frontal est actif."},{"q":"Utiliser son téléphone en conduisant est permis :","choices":["Uniquement via un kit mains libres, téléphone fixé","En le tenant à la main aux feux rouges","Pour les SMS courts","Jamais, même en mains libres"],"answer":0,"explain":"Seul le mains libres (דיבורית) avec téléphone fixé est autorisé. Tenir ou manipuler le téléphone : 1 000 ₪ et 8 points."},{"q":"En hiver, les feux de croisement de jour sont obligatoires :","choices":["Du 1er novembre au 31 mars, sur route interurbaine","Toute l'année, partout","Seulement quand il pleut","Du 1er décembre au 28 février"],"answer":0,"explain":"Règle 97 : du 1.11 au 31.3, feux allumés de jour hors agglomération (motos : toute l'année)."},{"q":"Une bordure de trottoir peinte ROUGE et BLANC signifie :","choices":["Arrêt ET stationnement interdits","Stationnement payant","Arrêt permis 5 minutes","Réservé aux résidents"],"answer":0,"explain":"Rouge-blanc = ni arrêt ni stationnement. C'est LE grand classique de l'examen."},{"q":"Une bordure peinte BLEU et BLANC signifie :","choices":["Stationnement payant/réglementé selon le panneau municipal","Stationnement gratuit illimité","Arrêt interdit","Réservé aux bus"],"answer":0,"explain":"Bleu-blanc = stationnement réglementé (heures, tarif, parfois résidents) — voir le panneau à proximité."},{"q":"Une bordure peinte ROUGE et JAUNE signifie :","choices":["Arrêt réservé aux bus/taxis — interdit aux autres","Stationnement payant","Zone de chantier","Stationnement de nuit uniquement"],"answer":0,"explain":"Rouge-jaune = arrêt de bus ou station de taxis : ni arrêt ni stationnement pour les autres véhicules."},{"q":"Le stationnement est interdit à moins de … d'un carrefour :","choices":["12 mètres","5 mètres","20 mètres","30 mètres"],"answer":0,"explain":"Règle 72 : interdiction dans le carrefour et à moins de 12 m ; idem 12 m avant un passage piétons ; 20 m d'un passage à niveau."},{"q":"On dépasse un autre véhicule :","choices":["Par la gauche uniquement, avec visibilité suffisante","Par la droite si la voie est libre","Des deux côtés sur autoroute","Par la droite en agglomération"],"answer":0,"explain":"Règle 47 : dépassement par la gauche uniquement, route dégagée et visibilité adéquate."},{"q":"Sous un panneau « dépassement interdit » (420), il reste permis de dépasser :","choices":["Une moto ou un vélo","Un camion lent","Un bus","Rien du tout"],"answer":0,"explain":"L'interdiction vise les véhicules « à plus de deux roues » : dépasser un deux-roues reste permis."},{"q":"La ligne JAUNE continue au bord droit de la chaussée :","choices":["Délimite l'accotement — roule à sa gauche","Sépare les deux sens de circulation","Interdit le stationnement","Réservée aux bus"],"answer":0,"explain":"En Israël, la ligne jaune de rive délimite l'accotement (שול). Ce n'est PAS une séparation de sens."},{"q":"En zone de travaux, un marquage ORANGE contredit le marquage blanc. Tu suis :","choices":["Le marquage orange","Le marquage blanc","Le plus restrictif des deux","Aucun : tu t'arrêtes"],"answer":0,"explain":"Le marquage temporaire orange PRIME sur le marquage permanent blanc en zone de chantier."},{"q":"Au panneau STOP israélien (main levée), tu dois :","choices":["T'arrêter complètement, même si la voie est totalement libre","Ralentir et passer si c'est libre","T'arrêter seulement si un véhicule arrive","Céder uniquement aux piétons"],"answer":0,"explain":"Le STOP exige un arrêt complet dans tous les cas, puis on cède la priorité. Le « cédez » (301) permet lui de passer sans arrêt si c'est libre."},{"q":"Un panneau interdit de tourner à gauche (429). Le demi-tour à gauche est :","choices":["Permis, sauf panneau 431, marquage contraire ou panneau monté sur un feu","Interdit aussi, toujours","Permis uniquement de nuit","Interdit sauf pour les taxis"],"answer":0,"explain":"Gros piège officiel : 429 seul n'interdit PAS le demi-tour. Il faut un 430/431 (ou un 429 au-dessus d'un feu) pour l'interdire."},{"q":"Quels véhicules peuvent entrer sur une autoroute (panneau 216) ?","choices":["Ceux capables de rouler à au moins 60 km/h","Tous les véhicules à moteur","Ceux qui roulent à plus de 80 km/h","Uniquement les voitures particulières"],"answer":0,"explain":"L'autoroute est interdite aux piétons, vélos, animaux et à tout véhicule ne pouvant rouler à 60 km/h minimum."},{"q":"Dans une rue résidentielle partagée (panneau 220), les piétons :","choices":["Peuvent utiliser toute la largeur de la rue","Doivent rester sur le trottoir","Sont interdits sur la chaussée","N'ont priorité qu'aux passages"],"answer":0,"explain":"Dans un רחוב משולב, les piétons (et les enfants qui jouent) peuvent utiliser toute la rue : conduis au pas, prêt à t'arrêter."},{"q":"Le panneau bleu à « maison rouge » (424) à l'entrée d'une ville signifie :","choices":["Zone urbaine : 50 km/h par défaut","Zone résidentielle : 30 km/h","Hôtel à proximité","Stationnement résidentiel"],"answer":0,"explain":"La « maison rouge » marque l'entrée d'une zone de routes urbaines : 50 km/h sauf indication contraire."},{"q":"Tu tombes en panne sur une route interurbaine et tu sors du véhicule. Tu dois :","choices":["Porter le gilet réfléchissant","Allumer le plafonnier","Rester dans la voiture obligatoirement","Placer le triangle à 5 mètres"],"answer":0,"explain":"Le gilet réfléchissant doit être à portée du conducteur et porté dès qu'on sort du véhicule hors agglomération."},{"q":"Le feu est vert mais le carrefour est bouché. Tu :","choices":["N'entres pas tant que tu ne peux pas le dégager entièrement","Entres puisque c'est vert","Klaxonnes et avances","Passes lentement au milieu"],"answer":0,"explain":"Règle 65 : interdiction d'entrer dans une intersection, même au vert, si on ne peut pas la traverser et la dégager."},{"q":"Un signaleur de chantier te présente un panneau STOP mobile (304). Tu repars :","choices":["Seulement quand il t'y autorise (ou montre le panneau 305)","Dès que la voie te semble libre","Après 3 secondes d'arrêt","Quand le véhicule devant avance"],"answer":0,"explain":"Après un 304, on ne repart que sur autorisation du signaleur ou à la présentation du 305 « avance avec prudence »."},{"q":"Celui qui tourne à GAUCHE dans un carrefour :","choices":["Cède le passage aux véhicules venant en face","A la priorité sur tout le monde","Passe avant ceux qui viennent de droite","Doit klaxonner"],"answer":0,"explain":"Le tourne-à-gauche cède aux véhicules venant en face (et aux piétons qui traversent la rue où il s'engage)."},{"q":"Combien de temps le résultat de l'examen théorique reste-t-il valable ?","choices":["5 ans","6 mois","1 an","2 ans"],"answer":0,"explain":"Le résultat de la théorie est valable 5 ans (règle mise à jour — d'anciennes sources citent encore 2-3 ans)."}];

/* Paramètres examen blanc — alignés sur l'examen réel (vérifiés) */
const EXAM = { total: 30, pass: 26, minutes: 40 };

const CATS = [
  { id:'danger',      label:'Danger',       color:'#c8102e' },
  { id:'priorite',    label:'Priorité',     color:'#c8102e' },
  { id:'interdiction',label:'Interdiction', color:'#c8102e' },
  { id:'obligation',  label:'Obligation',   color:'#1467b3' },

];

/* ================= ÉTAT PERSISTANT ================= */
const store = {
  read(k, fb){ try{ const v = localStorage.getItem('crIL.'+k); return v===null? fb : JSON.parse(v);}catch(e){ return fb; } },
  write(k, v){ try{ localStorage.setItem('crIL.'+k, JSON.stringify(v)); }catch(e){} }
};
let flashBoxes = store.read('flash', {});
let bestExam = store.read('bestExam', null);
let planDone = store.read('plan', {});
let examDate = store.read('examDate', '2026-07-22');

/* ================= UTILITAIRES ================= */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
function shuffle(a){ const x=[...a]; for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]]; } return x; }
function pick(a,n){ return shuffle(a).slice(0,n); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ================= NAVIGATION ================= */
function showView(name){
  $$('.view').forEach(v => v.classList.toggle('active', v.id === 'view-'+name));
  $$('nav.tabbar button').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  window.scrollTo({top:0});
  if(name==='accueil') renderHome();
  if(name==='cartes') renderFlashHome();
  if(name==='quiz' && !quizSession) renderQuizHome();
}
$$('nav.tabbar button').forEach(b => b.addEventListener('click', () => { quizSession=null; showView(b.dataset.view); }));

/* ================= COMPTE À REBOURS ================= */
function renderCountdown(){
  const el = $('#countdown');
  if(!examDate){ el.textContent = '📅 Examen ?'; el.classList.remove('urgent'); return; }
  const days = Math.ceil((new Date(examDate+'T09:00:00') - new Date()) / 86400000);
  if(days > 1){ el.textContent = '⏳ J-'+days; el.classList.toggle('urgent', days<=2); }
  else if(days === 1){ el.textContent = '🔥 Demain !'; el.classList.add('urgent'); }
  else if(days === 0){ el.textContent = "🎯 C'est aujourd'hui !"; el.classList.add('urgent'); }
  else { el.textContent = '✅ Examen passé'; el.classList.remove('urgent'); }
}

/* ================= PANNEAUX ================= */
let signFilter = 'tous';
function renderSignChips(){
  const chips = [{id:'tous',label:'Tous'}].concat(CATS);
  $('#sign-chips').innerHTML = chips.map(c =>
    `<button class="chip ${signFilter===c.id?'active':''}" onclick="setSignFilter('${c.id}')">${c.label}</button>`).join('');
}
function setSignFilter(id){ signFilter=id; renderSignChips(); renderSignGrid(); }
function renderSignGrid(){
  const list = SIGNS.filter(s => signFilter==='tous' || s.cat===signFilter);
  $('#sign-grid').innerHTML = list.map(s =>
    `<div class="sign-cell ${(flashBoxes[s.id]||0)>=2?'mastered':''}" onclick="openSign('${s.id}')">${s.svg}<div class="nm">${esc(s.name)}</div></div>`).join('');
}
function openSign(id){
  const s = SIGNS.find(x=>x.id===id); if(!s) return;
  const cat = CATS.find(c=>c.id===s.cat);
  $('#sheet').innerHTML = `
    <div class="sign-big">${s.svg}</div>
    <h2>${esc(s.name)}</h2>
    <p class="num"><span class="pill" style="background:${cat.color}18;color:${cat.color}">${cat.label}${s.num? ' · n° '+esc(s.num):''}</span></p>
    <p>${s.sens}</p>
    ${s.tip? `<div class="tipbox"><b>💡 Astuce examen :</b> ${s.tip}</div>`:''}
    <button class="btn secondary block close" onclick="closeSheet()">Fermer</button>`;
  $('#sheet-backdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet(){ $('#sheet-backdrop').classList.remove('open'); document.body.style.overflow=''; }
$('#sheet-backdrop').addEventListener('click', e => { if(e.target.id==='sheet-backdrop') closeSheet(); });

/* ================= FLASHCARDS ================= */
let flashDeck = [], flashIdx = 0, flashRevealed = false, flashSessionStats = null;
function renderFlashHome(){
  const total = SIGNS.length, mastered = masteredCount();
  const toReview = SIGNS.filter(s=>(flashBoxes[s.id]||0)===0).length;
  $('#view-cartes').innerHTML = `
    <div class="card">
      <h2>🃏 Flashcards panneaux</h2>
      <p class="muted">Regarde le panneau, devine sa signification, puis retourne la carte. Sois honnête avec toi-même : « À revoir » le fera revenir plus souvent.</p>
      <div class="progressbar"><i style="width:${total?Math.round(mastered/total*100):0}%"></i></div>
      <p class="muted">${mastered} / ${total} maîtrisés · ${toReview} jamais vus ou à revoir</p>
      <button class="btn block" onclick="startFlash('smart')">▶ Séance intelligente (20 cartes)</button>
      <button class="btn secondary block" onclick="startFlash('tous')">Tous les panneaux</button>
      <div class="chips" style="margin-top:12px">
        ${CATS.map(c=>`<button class="chip" onclick="startFlash('${c.id}')">${c.label}</button>`).join('')}
      </div>
    </div>`;
}
function startFlash(mode){
  let pool = SIGNS;
  if(mode!=='tous' && mode!=='smart') pool = SIGNS.filter(s=>s.cat===mode);
  if(mode==='smart'){
    const weighted = [];
    SIGNS.forEach(s => { const b = flashBoxes[s.id]||0; const w = b===0?4 : b===1?2 : 1; for(let i=0;i<w;i++) weighted.push(s); });
    const seen = new Set(); flashDeck = [];
    for(const s of shuffle(weighted)){ if(!seen.has(s.id)){ seen.add(s.id); flashDeck.push(s); if(flashDeck.length>=20) break; } }
  } else {
    flashDeck = shuffle(pool);
  }
  if(!flashDeck.length) return;
  flashIdx = 0; flashRevealed = false; flashSessionStats = {ok:0, ko:0};
  renderFlashCard();
}
function renderFlashCard(){
  if(flashIdx >= flashDeck.length){ renderFlashEnd(); return; }
  const s = flashDeck[flashIdx];
  $('#view-cartes').innerHTML = `
    <div class="quiz-top">
      <span>Carte ${flashIdx+1} / ${flashDeck.length}</span>
      <button class="chip" onclick="renderFlashHome()">✕ Quitter</button>
    </div>
    <div class="card flash-stage" onclick="${flashRevealed?'':'revealFlash()'}">
      ${s.svg}
      ${flashRevealed
        ? `<div class="flash-answer"><h3>${esc(s.name)}</h3><p class="muted">${s.sens}</p></div>`
        : `<p class="muted" style="margin-top:14px">Touche la carte pour voir la réponse</p>`}
    </div>
    ${flashRevealed ? `
      <div class="flash-btns">
        <button class="btn red" onclick="gradeFlash(false)">😕 À revoir</button>
        <button class="btn green" onclick="gradeFlash(true)">😊 Je sais</button>
      </div>` : ''}`;
}
function revealFlash(){ flashRevealed = true; renderFlashCard(); }
function gradeFlash(ok){
  const s = flashDeck[flashIdx];
  const b = flashBoxes[s.id]||0;
  flashBoxes[s.id] = ok ? Math.min(3, b+1) : 0;
  store.write('flash', flashBoxes);
  flashSessionStats[ok?'ok':'ko']++;
  flashIdx++; flashRevealed = false;
  renderFlashCard();
}
function renderFlashEnd(){
  const {ok, ko} = flashSessionStats;
  $('#view-cartes').innerHTML = `
    <div class="card" style="text-align:center">
      <h2>Séance terminée ! 🎉</h2>
      <p class="score-big" style="color:var(--green)">${ok} ✓</p>
      <p class="muted">${ko} carte${ko>1?'s':''} à revoir — elle${ko>1?'s':''} reviendr${ko>1?'ont':'a'} en priorité.</p>
      <button class="btn block" onclick="startFlash('smart')">▶ Nouvelle séance</button>
      <button class="btn secondary block" onclick="renderFlashHome()">Retour</button>
    </div>`;
}

/* ================= QUIZ ================= */
let quizSession = null, examTimer = null;

function buildSignQuestion(sign, reverse){
  const others = pick(SIGNS.filter(s => s.id!==sign.id && s.cat===sign.cat), 3);
  while(others.length<3){ const extra = SIGNS.find(s=>s.id!==sign.id && !others.includes(s)); if(!extra) break; others.push(extra); }
  if(reverse){
    return { type:'signrev', q:`Quel panneau signifie : « ${sign.short||sign.name} » ?`,
      options: shuffle([sign, ...others]).map(s=>({svg:s.svg, id:s.id})),
      answerId: sign.id, explain: sign.sens, sign };
  }
  return { type:'sign', q:'Que signifie ce panneau ?', sign,
    options: shuffle([sign, ...others]).map(s=>({label:s.short||s.name, id:s.id})),
    answerId: sign.id, explain: sign.sens };
}
function buildTheoryQuestion(tq){
  const opts = tq.choices.map((c,i)=>({label:c, id:i}));
  return { type:'theory', q:tq.q, options:shuffle(opts), answerId:tq.answer, explain:tq.explain };
}
function makeQuiz(kind){
  let qs = [];
  if(kind==='panneaux'){
    qs = pick(SIGNS.filter(s=>s.cat!=='marquage'), 15).map((s,i)=> buildSignQuestion(s, i%3===2));
  } else if(kind==='theorie'){
    qs = pick(THEORY_QUESTIONS, Math.min(15, THEORY_QUESTIONS.length)).map(buildTheoryQuestion);
  } else {
    const nTheory = Math.min(15, THEORY_QUESTIONS.length);
    const signQs = pick(SIGNS.filter(s=>s.cat!=='marquage'), EXAM.total-nTheory).map((s,i)=> buildSignQuestion(s, i%3===2));
    const thQs = pick(THEORY_QUESTIONS, nTheory).map(buildTheoryQuestion);
    qs = shuffle([...signQs, ...thQs]);
  }
  return qs;
}
function renderQuizHome(){
  clearInterval(examTimer);
  $('#view-quiz').innerHTML = `
    <div class="card">
      <h2>✅ S'entraîner</h2>
      <p class="muted">Feedback immédiat après chaque question, avec explication.</p>
      <button class="btn block" onclick="startQuiz('panneaux','practice')">🚸 Quiz panneaux (15 questions)</button>
      <button class="btn secondary block" onclick="startQuiz('theorie','practice')">📚 Quiz théorie (15 questions)</button>
    </div>
    <div class="card">
      <h2>🎓 Examen blanc</h2>
      <p class="muted">Comme le vrai examen : ${EXAM.total} questions, ${EXAM.minutes} minutes, réponses corrigées seulement à la fin. Il faut au moins ${EXAM.pass} bonnes réponses.</p>
      <button class="btn green block" onclick="startQuiz('examen','exam')">🎯 Lancer l'examen blanc</button>
      ${bestExam!==null? `<p class="muted" style="margin-top:8px;text-align:center">Meilleur score : ${bestExam} / ${EXAM.total}</p>`:''}
    </div>`;
}
function startQuiz(kind, mode){
  const questions = makeQuiz(kind);
  if(!questions.length) return;
  quizSession = { kind, mode, questions, idx:0, answers:[], done:false, secondsLeft: EXAM.minutes*60 };
  if(mode==='exam'){
    clearInterval(examTimer);
    examTimer = setInterval(()=>{
      if(!quizSession || quizSession.done){ clearInterval(examTimer); return; }
      quizSession.secondsLeft--;
      const t = $('#exam-clock');
      if(t) t.textContent = fmtClock(quizSession.secondsLeft);
      if(quizSession.secondsLeft<=0){ finishQuiz(); }
    }, 1000);
  }
  renderQuestion();
}
function fmtClock(s){ const m=Math.floor(s/60), r=s%60; return m+':'+String(r).padStart(2,'0'); }
function renderQuestion(){
  const S = quizSession, q = S.questions[S.idx];
  const answered = S.answers[S.idx] !== undefined;
  const picked = S.answers[S.idx];
  $('#view-quiz').innerHTML = `
    <div class="quiz-top">
      <span>Question ${S.idx+1} / ${S.questions.length}</span>
      ${S.mode==='exam' ? `<span id="exam-clock" style="color:var(--red)">${fmtClock(S.secondsLeft)}</span>`:''}
      <button class="chip" onclick="abandonQuiz()">✕ Quitter</button>
    </div>
    <div class="card">
      <p style="font-weight:600;font-size:15.5px">${esc(q.q)}</p>
      ${q.type==='sign' ? `<div class="q-sign">${q.sign.svg}</div>`:''}
      <div style="margin-top:12px">
      ${q.options.map(o=>{
        let cls = 'qopt';
        if(answered && S.mode==='practice'){
          if(o.id===q.answerId) cls += ' correct';
          else if(o.id===picked) cls += ' wrong';
        } else if(answered && o.id===picked){ cls += ' reveal'; }
        const inner = q.type==='signrev' ? `<span class="optsign">${o.svg}</span>` : esc(o.label);
        return `<button class="${cls}" ${answered?'disabled':''} onclick="answerQuiz(${esc(JSON.stringify(o.id))})">${inner}</button>`;
      }).join('')}
      </div>
      ${answered && S.mode==='practice' ? `
        <div class="explain ${picked===q.answerId?'good':'bad'}">
          ${picked===q.answerId?'✅ Exact !':'❌ Pas tout à fait.'} ${q.explain}
        </div>
        <button class="btn block" onclick="nextQuestion()">${S.idx+1<S.questions.length?'Question suivante →':'Voir le résultat'}</button>`:''}
    </div>`;
}
function answerQuiz(id){
  const S = quizSession;
  S.answers[S.idx] = id;
  if(S.mode==='exam'){
    if(S.idx+1 < S.questions.length){ S.idx++; renderQuestion(); }
    else finishQuiz();
  } else {
    renderQuestion();
  }
}
function nextQuestion(){
  const S = quizSession;
  if(S.idx+1 < S.questions.length){ S.idx++; renderQuestion(); }
  else finishQuiz();
}
function abandonQuiz(){ quizSession=null; clearInterval(examTimer); renderQuizHome(); }
function finishQuiz(){
  const S = quizSession; S.done = true; clearInterval(examTimer);
  const score = S.questions.reduce((n,q,i)=> n + (S.answers[i]===q.answerId ?1:0), 0);
  const isExam = S.mode==='exam';
  if(isExam && (bestExam===null || score>bestExam)){ bestExam = score; store.write('bestExam', bestExam); }
  const pass = score >= Math.round(EXAM.pass * S.questions.length / EXAM.total);
  $('#view-quiz').innerHTML = `
    <div class="card">
      <p class="score-big" style="color:${pass?'var(--green)':'var(--red)'}">${score} / ${S.questions.length}</p>
      ${isExam? `<p class="verdict ${pass?'pass':'fail'}">${pass? '🎉 Reçue ! (seuil : '+EXAM.pass+')' : 'Pas encore — il faut '+EXAM.pass+' bonnes réponses.'}</p>`
              : `<p class="verdict ${pass?'pass':'fail'}">${pass? 'Très bien ! 🎉':'Continue, ça vient ! 💪'}</p>`}
      <button class="btn block" onclick="startQuiz('${S.kind}','${S.mode}')">↻ Recommencer</button>
      <button class="btn secondary block" onclick="quizSession=null;renderQuizHome()">Retour aux quiz</button>
    </div>
    ${renderReview(S)}`;
  window.scrollTo({top:0});
}
function renderReview(S){
  const wrong = S.questions.map((q,i)=>({q,i})).filter(x => S.answers[x.i]!==x.q.answerId);
  if(!wrong.length) return `<div class="card"><p>Sans faute, bravo ! 🌟</p></div>`;
  return `<div class="card"><h2>À revoir (${wrong.length})</h2>
    ${wrong.map(({q,i})=>{
      const yourAns = q.options.find(o=>o.id===S.answers[i]);
      const goodAns = q.options.find(o=>o.id===q.answerId);
      return `<div class="review-item">
        <p class="rq">${esc(q.q)}</p>
        ${q.type==='sign' ? q.sign.svg : ''}
        ${q.type==='signrev' ? `<p class="muted">Bonne réponse :</p>${goodAns.svg}` : `<p class="muted">Bonne réponse : <b>${esc(goodAns.label)}</b></p>`}
        ${yourAns!==undefined ? (q.type==='signrev' ? '' : `<p class="muted">Ta réponse : ${esc(yourAns.label||'—')}</p>`) : `<p class="muted">Pas de réponse (temps écoulé)</p>`}
        <p style="font-size:13.5px;margin-top:4px">${q.explain}</p>
      </div>`;
    }).join('')}
  </div>`;
}

renderCountdown();
setInterval(renderCountdown, 60000);
renderLessons();
renderSignChips();
renderSignGrid();
renderHome();
showView('accueil');
</script>
